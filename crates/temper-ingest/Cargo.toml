[package]
name = "temper-ingest"
version = "0.1.0"
edition = "2021"
description = "Embedding and extraction pipeline for temper knowledge base"

[package.metadata.cargo-machete]
ignored = ["tantivy", "hnsw_rs"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
hf-hub = { version = "0.4", optional = true }
html-to-markdown-rs = "3.1.0"
kreuzberg = { version = "4.6.3", features = ["tokio-runtime"], optional = true }
ndarray = { version = "0.17", optional = true }
ort = { version = "2.0.0-rc.12", default-features = false, features = [
  "api-18",
  "load-dynamic",
  "ndarray",
  "std",
  "tracing"
], optional = true }
regex = "1"
sha2 = "0.10"
similar = "2"
tantivy = { version = "0.22", optional = true }
hnsw_rs = { version = "0.3", optional = true }
temper-core = { path = "../temper-core" }
thiserror = "2"
tokenizers = { version = "0.22", optional = true }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }

[features]
default = ["embed", "extract"]
embed = ["dep:ndarray", "dep:ort", "dep:tokenizers"]
embed-download = ["dep:hf-hub", "dep:ndarray", "dep:ort", "dep:tokenizers"]
extract = ["dep:kreuzberg"]
hnsw = ["dep:tantivy", "dep:hnsw_rs"]
test-embed = ["embed"]
