[package]
name = "temper-cli"
version = "0.1.0"
edition = "2021"
description = "Developer workflow tool for agent-assisted development"

[[bin]]
name = "temper"
path = "src/main.rs"

[dependencies]
temper-core = { path = "../temper-core" }
temper-client = { path = "../temper-client" }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anstream = "0.6"
anstyle = "1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
dirs = "5"
base64 = "0.22"
uuid = { version = "1", features = ["v7", "serde"] }
temper-embed = { path = "../temper-embed" }
ignore = "0.4"
indicatif = "0.17"

[features]
default = ["extract", "embed"]
extract = ["temper-embed/extract"]
embed = ["temper-embed/embed"]

[dev-dependencies]
tempfile = "3"
