plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    # `rake generate` is the only writer of the generated tree. Linting it would
    # mean hand-editing it.
    - 'lib/temper/generated/**/*'
    - 'lib/temper/generated.rb'
    - 'vendor/**/*'

Style/Documentation:
  Enabled: false

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'

RSpec/MultipleExpectations:
  Enabled: false

# connection_spec exercises module-level behaviour spread across Temper and
# Temper::Generated (memoization, fiber-local token scoping, adapter install).
# There is no single class to name, and naming Temper would demand the file sit
# at spec/temper_spec.rb, which already describes the configuration surface.
RSpec/DescribeClass:
  Exclude:
    - 'spec/temper/connection_spec.rb'

RSpec/ExampleLength:
  Enabled: false
