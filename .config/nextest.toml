[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }
status-level = "skip"
final-status-level = "flaky"

[profile.ci]
retries = 1
fail-fast = false

# The temper-next scenario write-path tests own the `temper_next` artifact namespace (each resets it
# to a clean 01+02 then seeds), so they must run one-at-a-time — a reset must never race a sibling's
# queries. Local-only (no CI job enables `artifact-tests`).
[test-groups]
temper-next-write = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(temper-next) & binary(/^bootseed$|^scenario_load$|^scenario_roundtrip$|^scenario_steps$|^content_multichunk$|^cogmap_genesis_charter$|^charter_block_roles$|^charter_yaml_roundtrip$|^ledger_envelope$|^replay_roundtrip$|^seed_load_path_equivalence$|^seed_corpus_sweep$|^access_scenario$/)'
test-group = 'temper-next-write'
