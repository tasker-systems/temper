[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }
status-level = "skip"
final-status-level = "flaky"

[profile.ci]
retries = 1
fail-fast = false

# ---------------------------------------------------------------------------
# Per-test timeout overrides.
#
# The default (60s × 2 ⇒ killed at 120s) is the right guard for essentially every test we have. These
# are the deliberate exceptions — each is slow for a reason we have MEASURED, not because it hangs. If
# you add an entry here, say why, and link the task that will let you delete it again.
# ---------------------------------------------------------------------------

# `segmented_create_roundtrips_large_body` drives a >1 MiB body (~840 chunks) through the real CLI
# segmented-ingest path with real ONNX. **It is NOT hanging — it passes.** The cost is entirely native
# ONNX inference (all native C++, so this was never a debug-build story — release buys ~2.4%).
#
# It used to be 484s (full HF model, single core) and this override was 120s×6 ⇒ killed at 720s. Two
# fixes since then compounded to collapse it: #401 made the intra-op thread count configurable and CI
# now sets `TEMPER_ONNX_INTRA_THREADS=0` so inference uses all the runner's cores, and #400 stopped
# downloading the full HF model in favour of the repo's *quantized* copy (~1.9× faster inference). On a
# 10-core box the test now runs 82–98s. But CI runners have far fewer cores AND — since we deleted
# `--test-threads 1` — inference now shares them with the parallel test threads, so expect somewhere
# around 100–155s there. The override is retuned to 60s×5 ⇒ killed at 300s: comfortably above that
# estimate while being far tighter than the old 720s, so a genuine regression still trips it. If a real
# CI run confirms the actual time, tighten this further toward the 120s default.
#
# The body size is not incidental padding: it is the ONLY thing that pushes the CLI past
# `SEGMENT_BUDGET_BYTES` (256 KiB) and exercises the multi-block begin/append/finalize path at all. So
# do NOT "fix" this by shrinking the body — that deletes the coverage instead of the cost.
#
# Still a KNOWN, TEMPORARY DEBT scoped to ONE test — not a blanket loosening. Task `019f57d2` (ingest
# throughput spike) owns the rest: windowed batches, and overlapping embed with block upload, which
# today never overlap at all. Tighten this back toward the default as that lands.
[[profile.default.overrides]]
filter = 'test(=segmented_create_roundtrips_large_body)'
slow-timeout = { period = "60s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = 'test(=segmented_create_roundtrips_large_body)'
slow-timeout = { period = "60s", terminate-after = 5 }

# `system_admin_is_unforgeable_and_gates_admin_fns` is the trybuild proof of the admin-authz enclosure
# (the sealed `SystemAdmin` — spec 2026-07-22). **It is NOT hanging — it passes.** The cost is a COLD
# COMPILE, not runtime: trybuild builds each compile-fail fixture in an *isolated* workspace under
# `target/tests/trybuild/`, so it recompiles temper-services and its whole dep tree (ort included) from
# scratch rather than reusing the main build cache. Locally that's ~57s cold; on a CI runner it blew
# past the 120s default (60s×2) mid-`Checking temper-services-tests`. It was killed while still
# compiling, so the true cold-compile time is unknown — 60s×10 ⇒ killed at 600s is a deliberately
# generous first bound to get one green CI run WITHOUT a second slow round-trip; the log from that run
# reveals the real time, and this should then be tightened toward the default (see the segmented-body
# override above for the same measure-then-tighten pattern). If the CI cost proves not worth the proof,
# the fixtures can move behind a dedicated (still-in-a-job) feature — do NOT delete them: they are the
# guarantee demonstrated.
[[profile.default.overrides]]
filter = 'test(=system_admin_is_unforgeable_and_gates_admin_fns)'
slow-timeout = { period = "60s", terminate-after = 10 }

[[profile.ci.overrides]]
filter = 'test(=system_admin_is_unforgeable_and_gates_admin_fns)'
slow-timeout = { period = "60s", terminate-after = 10 }
