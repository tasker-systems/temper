name: Rust Tests

# =============================================================================
# Test tier notes:
#   cargo nextest run --workspace                         -> Unit tests only
#   cargo nextest run --workspace --features test-embed   -> + embedding tests
#   cargo nextest run --workspace --features test-db      -> + DB integration tests
#
# Embedding tests are excluded from CI (download HF models at runtime).
# =============================================================================

on:
  workflow_call:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SQLX_OFFLINE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test-v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run unit tests
        run: cargo nextest run --workspace --locked

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      SQLX_OFFLINE: "true"
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test-db-v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run integration & E2E tests
        run: cargo nextest run --workspace --features test-db --locked
