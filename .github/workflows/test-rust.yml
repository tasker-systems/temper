name: Rust Tests

# Jobs are split by INTENTION — by what a job needs from its ENVIRONMENT — never by feature flag:
#
#   Unit         no database.
#   Integration  needs Postgres (+ git-LFS for the bundled model). The whole DB-backed workspace, in
#                ONE command.
#   Artifacts    needs Postgres, but a different FEATURE SET (temper-substrate's write-path scenarios),
#                which is why it cannot fold into the workspace run above.
#
# ── Two rules that keep this honest ────────────────────────────────────────────────────────────────
#
# 1. **EVERY test job enables `test-embed`.** ONNX is installed in all of them (see the `install-onnx`
#    action), so "the job that has ONNX" stopped being a meaningful category some time ago — it was a
#    historical constraint and it is gone. Confining `test-embed` to a single job is exactly what let
#    `streaming_ingest_test` rot: its tests were COMPILED OUT of the integration job (test-db only) and
#    FILTERED OUT of the embed job (an allowlist), so they ran NOWHERE — and a 484-second test sat
#    undiscovered behind a green tick. Two gates, each individually reasonable, that together produced
#    a silent hole.
#
# 2. **Test selection is `--workspace`, never a hand-written list.** The old embed job named six
#    per-crate invocations plus an allowlist of individual e2e binaries — a structure that is only
#    correct while somebody remembers to update it, and it stopped being correct. `--workspace` is
#    correct BY CONSTRUCTION: a new crate, a new test file, a newly feature-gated test is picked up with
#    no CI edit at all. If you ever find yourself adding `-E 'binary(...)'` here to get CI green, you
#    are hiding a test, not fixing one.
#
# Coverage is NOT here. It lives in `coverage.yml` on a nightly schedule, so an instrumented-build OOM
# can never block a merge — and so the workspace is not tested twice on every single push.
#
# `--exclude temper-cloud`: the repo root is BOTH the workspace manifest and the temper-cloud package,
# and temper-cloud enables `ingest-pipeline` on temper-api, which unifies features across the build.
#
# `--test-threads 1`: temper-ingest holds its ONNX session behind a `Mutex<Session>` (`embed.rs`), so
# concurrent body-bearing tests contend on it and flake `embed_texts`. A cost we are paying, not a
# preference — task `019f57d2` owns removing it.
#
# `TEMPER_ONNX_INTRA_THREADS: 0` (every test job): #401 made the ONNX intra-op thread count
# configurable — the library still defaults to **1**, and `temper-cli`'s `main()` opts into `0`. But
# tests call the command functions DIRECTLY and never go through `main()`, so without this env var they
# would silently keep embedding on a single core. Setting it here is what actually gets the runner's
# cores in play. It composes fine with `--test-threads 1`: one embed at a time, using all cores, rather
# than one core while the rest idle.

on:
  workflow_call:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Let ORT parallelize inference across the runner's cores (#401). The library default is 1, and
      # `temper-cli`'s `main()` opts into 0 — but tests call the command functions DIRECTLY, never
      # through `main()`, so without this they would silently embed single-threaded. This env var is
      # the only lever that reaches them.
      TEMPER_ONNX_INTRA_THREADS: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        # Deliberately NO `lfs: true`. `embed` is a default feature of temper-cli, which selects
        # `temper-ingest/embed-download` — the model is fetched from HF at runtime, so the
        # `include_bytes!` git-LFS branch is cfg'd out and no LFS asset is read here. Only the ort
        # RUNTIME is needed. The DB jobs DO take LFS: they exercise the bundled server-side embed path.

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: unit-v3
          tools: nextest

      - uses: ./.github/actions/install-onnx

      - name: Cache the HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-base-en-v1.5-${{ runner.os }}

      - name: Warm the embedding model (serially, outside the test harness)
        # `embed` is a DEFAULT feature of temper-cli, and it selects `temper-ingest/embed-download` —
        # so a `--workspace` build fetches bge-base from HuggingFace at RUNTIME, not from the bundled
        # git-LFS asset (feature unification keeps `embed-download` winning, so the `include_bytes!`
        # branch is cfg'd out; that is also why this job takes no LFS).
        #
        # hf-hub takes a BLOB LOCK on that first download. This job runs tests in parallel, so once
        # `test-embed` is enabled workspace-wide, N threads all race the same first download and lose:
        #   `model init: download model: Lock acquisition failed: …/blobs/….lock`
        #
        # So do the download exactly ONCE, serially, before the parallel run — every subsequent test
        # then finds a warm cache and never touches the lock. (The integration job never hit this
        # because it already serializes on `--test-threads 1` for the ort mutex.)
        #
        # Deliberately `cargo test`, NOT `cargo nextest`: on a COLD cache this step's whole job is to
        # pull a ~400 MB model, which takes longer than nextest's 120s slow-timeout — so wrapping the
        # download in the very harness that imposes that timeout just gets it killed mid-download.
        # `cargo test` has no such timeout. (That is exactly how the first attempt at this step failed.)
        run: cargo test -p temper-ingest --features test-embed --locked --lib embed::tests::test_embed_text_dimension -- --exact --test-threads 1

      - name: Run unit tests
        # `test-embed` here too — temper-ingest's and temper-cli's embedding tests need no database, so
        # this is their home. They used to be two more hand-written invocations in the old embed job.
        run: cargo nextest run --workspace --features test-embed --locked --no-fail-fast

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    # The entire DB-backed workspace WITH embed, serialized on ort. It is the long pole by design —
    # it is now the job that actually runs everything.
    timeout-minutes: 60

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development
      # See the unit job: tests bypass `main()`, so the env var is the only thing that reaches them.
      # Safe alongside `--test-threads 1` — one embed at a time, using all cores, rather than one core
      # while the rest idle.
      TEMPER_ONNX_INTRA_THREADS: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # ⚠️ This is CURRENTLY WASTE, and is kept only because removing it is not free to verify.
          # It fetches the 105 MB git-LFS bge model, which this job then NEVER READS: `--workspace`
          # pulls in temper-cli, whose default `embed` selects `temper-ingest/embed-download`, and
          # feature unification cfg's the bundled `include_bytes!` branch out of the entire build — so
          # this tier takes the HF *download* path, not the bundled one (`cargo tree -e features -i
          # hf-hub --workspace` proves it). The comment this replaces claimed the opposite.
          # Task `019f5822` fixes the cause and deletes this line.
          lfs: true

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: integration-v3
          tools: nextest,sqlx-cli

      - uses: ./.github/actions/install-onnx

      - name: Cache the HuggingFace model
        # This job downloads bge from HF at runtime too — `--workspace` includes temper-cli, whose
        # default `embed` feature selects `temper-ingest/embed-download`, and feature unification then
        # cfg's the bundled `include_bytes!` branch out for the WHOLE build. (Which also means this
        # job's `lfs: true` currently fetches a 105 MB model it never reads. See task `019f5822`.)
        #
        # `actions/cache`, not an upload/download artifact: the model is IMMUTABLE, so it caches
        # perfectly and persists ACROSS runs. An artifact would need a `prepare` job that every other
        # job must `needs:` — serializing the DAG and re-shipping ~400 MB every single run to save a
        # download a cache does once, ever. (Artifacts are the right tool for per-commit BUILD OUTPUTS,
        # which is what ../tasker-core shares — those would thrash a cache key.)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-base-en-v1.5-${{ runner.os }}

      - name: Run migrations
        run: cargo sqlx migrate run --source migrations

      - name: Run integration & E2E tests
        # ONE command for the whole DB-backed workspace. This single line replaces the old integration
        # job AND all six per-crate invocations of the old embed job — including the e2e allowlist that
        # was keeping streaming_ingest_test out of CI entirely.
        run: |
          cargo nextest run \
            --workspace --exclude temper-cloud \
            --features test-db,test-embed \
            --locked --no-fail-fast --test-threads 1

  artifact-tests:
    name: Substrate Artifact Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Its own job because it is a different FEATURE SET, not a different environment: `artifact-tests`
    # runs temper-substrate's write-path scenarios on ephemeral per-test databases. It cannot fold into
    # the workspace run above — enabling the feature there would unify it across every crate.

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development
      # See the unit job: tests bypass `main()`, so the env var is the only thing that reaches them.
      # Safe alongside `--test-threads 1` — one embed at a time, using all cores, rather than one core
      # while the rest idle.
      TEMPER_ONNX_INTRA_THREADS: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: artifacts-v3
          tools: nextest,sqlx-cli

      - uses: ./.github/actions/install-onnx

      - name: Run migrations
        # NOT optional, and not only for the tests themselves: `DATABASE_URL` is set in this job, so
        # sqlx's `query!` macros verify against the LIVE database at COMPILE time. Against an
        # un-migrated database that is a build failure, not a test failure:
        #   `error returned from database: function cogmap_genesis(...) does not exist`
        #   ... originates in the macro `sqlx::query`
        # The tests themselves get ephemeral per-test databases from `#[sqlx::test(migrator = ...)]`;
        # this migrated database exists purely to satisfy the macros.
        run: cargo sqlx migrate run --source migrations

      - name: Run substrate artifact tests
        run: cargo nextest run -p temper-substrate --features artifact-tests --locked --no-fail-fast --test-threads 1
