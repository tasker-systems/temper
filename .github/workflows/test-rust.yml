name: Rust Tests

# Jobs are split by INTENTION — by what a job needs from its ENVIRONMENT — never by feature flag:
#
#   Unit         no database.
#   Integration  needs Postgres (+ git-LFS for the bundled model). The whole DB-backed workspace, in
#                ONE command.
#   Artifacts    needs Postgres, but a different FEATURE SET (temper-substrate's write-path scenarios),
#                which is why it cannot fold into the workspace run above.
#
# ── Two rules that keep this honest ────────────────────────────────────────────────────────────────
#
# 1. **EVERY test job enables `test-embed`.** ONNX is installed in all of them (see the `install-onnx`
#    action), so "the job that has ONNX" stopped being a meaningful category some time ago — it was a
#    historical constraint and it is gone. Confining `test-embed` to a single job is exactly what let
#    `streaming_ingest_test` rot: its tests were COMPILED OUT of the integration job (test-db only) and
#    FILTERED OUT of the embed job (an allowlist), so they ran NOWHERE — and a 484-second test sat
#    undiscovered behind a green tick. Two gates, each individually reasonable, that together produced
#    a silent hole.
#
# 2. **Test selection is `--workspace`, never a hand-written list.** The old embed job named six
#    per-crate invocations plus an allowlist of individual e2e binaries — a structure that is only
#    correct while somebody remembers to update it, and it stopped being correct. `--workspace` is
#    correct BY CONSTRUCTION: a new crate, a new test file, a newly feature-gated test is picked up with
#    no CI edit at all. If you ever find yourself adding `-E 'binary(...)'` here to get CI green, you
#    are hiding a test, not fixing one.
#
# Coverage is NOT here. It lives in `coverage.yml` on a nightly schedule, so an instrumented-build OOM
# can never block a merge — and so the workspace is not tested twice on every single push.
#
# `--exclude temper-cloud`: the repo root is BOTH the workspace manifest and the temper-cloud package,
# and temper-cloud enables `ingest-pipeline` on temper-api, which unifies features across the build.
#
# Test parallelism is ON (no `--test-threads 1`). The suite used to be serialized against a flake in
# `embed_texts` under concurrent body-bearing tests — but that rationale was false: temper-ingest holds
# its ONNX session behind a `Mutex<Session>` (`embed.rs`), and a mutex makes concurrent embeds BLOCK, not
# flake. The real flake was a lock RACE — hf-hub's blob lock on the model download
# (`Lock acquisition failed: …/blobs/….lock`) — which #400 already removed by pointing ORT at the model
# in the checkout (`TEMPER_ONNX_MODEL_PATH`, below). With the download gone the serialization was
# guarding a wound that was already closed. Deleting it measured ~7× on the integration job
# (1556s → 222s), 1871/1871 passing across three full runs with zero flakes.
#
# `TEMPER_ONNX_INTRA_THREADS: 0` (every test job): #401 made the ONNX intra-op thread count
# configurable — the library still defaults to **1**, and `temper-cli`'s `main()` opts into `0`. But
# tests call the command functions DIRECTLY and never go through `main()`, so without this env var they
# would silently keep embedding on a single core. Setting it here is what actually gets the runner's
# cores in play — inference now shares those cores with the parallel test threads rather than owning
# them all one embed at a time.
#
# `TEMPER_ONNX_MODEL_PATH` (every test job) + `lfs: true`: **we ship the model; stop downloading it.**
# A `--workspace` build pulls in temper-cli, whose default `embed` selects `temper-ingest/embed-download`,
# and feature unification then cfg's the bundled `include_bytes!` branch out of the WHOLE build — so CI
# was fetching ~400 MB of `onnx/model.onnx` from HuggingFace while a 105 MB quantized copy sat in the
# repo, pinned long ago for Vercel. Pointing ORT straight at the checkout deletes the download, and with
# it a serial prewarm step, two `actions/cache` blocks, and an entire class of failure: hf-hub takes a
# blob lock on first download, and parallel test threads raced it
# (`Lock acquisition failed: …/blobs/….lock`).
#
# It also closes a FIDELITY GAP nobody had noticed: the server (temper-api — no temper-cli in its graph)
# runs the **bundled quantized** model, while CI was testing against the **full** model from HF. CI was
# not exercising the model production actually runs. Now it is.

on:
  workflow_call:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Let ORT parallelize inference across the runner's cores (#401). The library default is 1, and
      # `temper-cli`'s `main()` opts into 0 — but tests call the command functions DIRECTLY, never
      # through `main()`, so without this they would silently embed single-threaded. This env var is
      # the only lever that reaches them.
      TEMPER_ONNX_INTRA_THREADS: 0
      # Load the model from the checkout instead of downloading it: the repo already ships it.
      TEMPER_ONNX_MODEL_PATH: ${{ github.workspace }}/crates/temper-ingest/models/bge-base-en-v1.5/model_quantized.onnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetches `models/bge-base-en-v1.5/model_quantized.onnx` (105 MB), which
          # `TEMPER_ONNX_MODEL_PATH` below points ORT at. Cheaper than the ~400 MB HuggingFace
          # download this replaces — and it is the model the SERVER actually runs.
          lfs: true

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: unit-v4
          tools: nextest

      - uses: ./.github/actions/install-onnx

      - name: Run unit tests
        # `test-embed` here too — temper-ingest's and temper-cli's embedding tests need no database, so
        # this is their home. They used to be two more hand-written invocations in the old embed job.
        run: cargo nextest run --workspace --features test-embed --locked --no-fail-fast

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    # The entire DB-backed workspace WITH embed, run in parallel. It is the long pole by design —
    # it is now the job that actually runs everything.
    timeout-minutes: 60

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development
      # See the unit job: tests bypass `main()`, so the env var is the only thing that reaches them.
      TEMPER_ONNX_INTRA_THREADS: 0
      # Load the model from the checkout instead of downloading it: the repo already ships it.
      TEMPER_ONNX_MODEL_PATH: ${{ github.workspace }}/crates/temper-ingest/models/bge-base-en-v1.5/model_quantized.onnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Now MEANINGFUL: it fetches the model `TEMPER_ONNX_MODEL_PATH` points ORT at. Until this
          # commit it fetched 105 MB this job never read, while the job separately downloaded ~400 MB
          # from HuggingFace.
          lfs: true

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: integration-v4
          tools: nextest,sqlx-cli

      - uses: ./.github/actions/install-onnx

      - name: Run migrations
        run: cargo sqlx migrate run --source migrations

      - name: Run integration & E2E tests
        # ONE command for the whole DB-backed workspace. This single line replaces the old integration
        # job AND all six per-crate invocations of the old embed job — including the e2e allowlist that
        # was keeping streaming_ingest_test out of CI entirely.
        run: |
          cargo nextest run \
            --workspace --exclude temper-cloud \
            --features test-db,test-embed \
            --locked --no-fail-fast

  artifact-tests:
    name: Substrate Artifact Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Its own job because it is a different FEATURE SET, not a different environment: `artifact-tests`
    # runs temper-substrate's write-path scenarios on ephemeral per-test databases. It cannot fold into
    # the workspace run above — enabling the feature there would unify it across every crate.

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development
      # See the unit job: tests bypass `main()`, so the env var is the only thing that reaches them.
      TEMPER_ONNX_INTRA_THREADS: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: artifacts-v3
          tools: nextest,sqlx-cli

      - uses: ./.github/actions/install-onnx

      - name: Run migrations
        # NOT optional, and not only for the tests themselves: `DATABASE_URL` is set in this job, so
        # sqlx's `query!` macros verify against the LIVE database at COMPILE time. Against an
        # un-migrated database that is a build failure, not a test failure:
        #   `error returned from database: function cogmap_genesis(...) does not exist`
        #   ... originates in the macro `sqlx::query`
        # The tests themselves get ephemeral per-test databases from `#[sqlx::test(migrator = ...)]`;
        # this migrated database exists purely to satisfy the macros.
        run: cargo sqlx migrate run --source migrations

      - name: Run substrate artifact tests
        run: cargo nextest run -p temper-substrate --features artifact-tests --locked --no-fail-fast
