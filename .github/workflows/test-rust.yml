name: Rust Tests

# =============================================================================
# Test tier notes:
#   cargo nextest run --workspace                         -> Unit tests only
#   cargo nextest run --workspace --features test-embed   -> + embedding tests
#   cargo nextest run --workspace --features test-db      -> + DB integration tests
#
# DB integration and embedding tiers are excluded from CI.
# DB tests require Docker Postgres; embedding tests download HF models.
# =============================================================================

on:
  workflow_call:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run unit tests
        run: cargo nextest run --workspace --locked
