name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing temper v${VERSION}"

  build-cli-binaries:
    name: Build CLI Binaries
    needs: determine-version
    permissions:
      contents: read
    uses: ./.github/workflows/build-cli-binaries.yml
    with:
      version: ${{ needs.determine-version.outputs.version }}

  release-summary:
    name: Release Summary
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [determine-version, build-cli-binaries]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download CLI binary artifacts
        if: needs.build-cli-binaries.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: cli-v${{ needs.determine-version.outputs.version }}-*
          path: cli-artifacts/
          merge-multiple: true

      - name: Write job summary
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
          BUILD_RESULT: ${{ needs.build-cli-binaries.result }}
        run: |
          case "$BUILD_RESULT" in
            success)   ICON="✅" ;;
            failure)   ICON="❌" ;;
            cancelled) ICON="⏹️" ;;
            skipped)   ICON="⏭️" ;;
            *)         ICON="❓" ;;
          esac
          {
            echo "## Release v${VERSION}"
            echo ""
            echo "| Build matrix | Result |"
            echo "|---|---|"
            echo "| all platforms (darwin-arm64 / linux-x64 / windows-x64) | ${ICON} ${BUILD_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        if: needs.build-cli-binaries.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.determine-version.outputs.version }}
          ARTIFACT_DIR: cli-artifacts
        run: ./.github/scripts/release/create-github-release.sh

      - name: Fail the job if build did not succeed
        if: needs.build-cli-binaries.result != 'success'
        run: |
          echo "::error::build-cli-binaries result: ${{ needs.build-cli-binaries.result }} — release not published."
          exit 1
