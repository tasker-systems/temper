name: Code Quality

on:
  workflow_call:

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # All `sqlx::query!()` macros here verify OFFLINE against the committed per-crate .sqlx caches
    # (SQLX_OFFLINE below). This is required, not just convenient: the `next-backend` feature pulls
    # temper-next in as a compiled dependency, and temper-next's macros target the `temper_next`
    # artifact namespace, which can't be validated against this job's migrated `public` schema. The
    # Postgres service + `cargo sqlx migrate run` step remain as a cheap migrations-apply smoke check
    # (every migration, incl. the temper_next install + forward deltas, must apply cleanly).
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development
      # Verify query macros against the committed .sqlx caches (see the note above the service block).
      SQLX_OFFLINE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: code-quality

      - name: Install cargo-sqlx
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check formatting
        run: cargo fmt --all -- --check

      # The whole job runs OFFLINE (SQLX_OFFLINE in env above). temper-next keeps its own clippy/doc
      # steps below (its sqlx! macros target the temper_next artifact namespace, resolved from its
      # per-crate .sqlx cache); the --workspace passes exclude it to avoid double-linting.
      - name: Run Clippy lints
        run: cargo clippy --workspace --exclude temper-next --all-targets --all-features -- -D warnings

      - name: Run Clippy lints (temper-next, offline)
        run: cargo clippy -p temper-next --all-targets --all-features -- -D warnings
        env:
          SQLX_OFFLINE: "true"

      - name: Check documentation builds
        run: cargo doc --workspace --exclude temper-next --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Check documentation builds (temper-next, offline)
        run: cargo doc -p temper-next --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings
          SQLX_OFFLINE: "true"

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check for unused dependencies
        run: cargo machete --with-metadata

      - name: Security audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit

  typescript-quality:
    name: TypeScript Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd packages/temper-cloud && bun install --frozen-lockfile

      - name: Type check
        run: cd packages/temper-cloud && bun run typecheck

      - name: Lint and format check
        run: cd packages/temper-cloud && bun run check
