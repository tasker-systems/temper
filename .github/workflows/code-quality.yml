name: Code Quality

on:
  workflow_call:

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Clippy runs `--workspace --all-targets`, which compiles test targets that
    # use compile-time `sqlx::query!()` macros. `cargo sqlx prepare` cannot cache
    # queries from test targets, so under SQLX_OFFLINE those macros fail with
    # "set DATABASE_URL to use query macros online". Provide a migrated Postgres
    # so the macros verify online — the same service the integration-tests job
    # uses.
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: code-quality

      - name: Install cargo-sqlx
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check documentation builds
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check for unused dependencies
        run: cargo machete --with-metadata

      - name: Security audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit

  typescript-quality:
    name: TypeScript Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd packages/temper-cloud && bun install --frozen-lockfile

      - name: Type check
        run: cd packages/temper-cloud && bun run typecheck

      - name: Lint and format check
        run: cd packages/temper-cloud && bun run check
