name: Code Quality

on:
  workflow_call:

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # All `sqlx::query!()` macros here verify OFFLINE against the committed workspace .sqlx cache
    # (SQLX_OFFLINE below). The Postgres service + `cargo sqlx migrate run` step remain as a cheap
    # migrations-apply smoke check (every migration must apply cleanly).
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: temper_development
          POSTGRES_USER: temper
          POSTGRES_PASSWORD: temper
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U temper -d temper_development"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://temper:temper@localhost:5437/temper_development
      # Verify query macros against the committed .sqlx caches (see the note above the service block).
      SQLX_OFFLINE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: code-quality

      - name: Install cargo-sqlx and cargo-make
        uses: taiki-e/install-action@v2
        with:
          # cargo-make is here for the ts-rs drift gate below, which invokes
          # `cargo make generate-ts-types` — deliberately the same entry point a developer runs,
          # so the gate cannot check a different generator than the one people use.
          tool: sqlx-cli,cargo-make

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check OpenAPI spec is up to date with the router
        run: bash .github/scripts/check-openapi-spec.sh

      - name: Check every route is documented (OpenAPI route allowlist)
        run: bash .github/scripts/check-openapi-routes.sh

      # The cross-LANGUAGE gate. Every other check in this job lives inside Rust, so a type and its
      # generated TypeScript mirror can disagree while both languages stay green — which is exactly
      # how PR #498 merged with tsc clean and 79/79 tests passing against a contract the server had
      # stopped emitting. Its harness is in the guard-tests job; it runs here because it needs cargo.
      - name: Check generated TypeScript types are up to date with the Rust (ts-rs drift)
        run: bash .github/scripts/check-ts-rs-drift.sh

      # Security tripwires (docs/development/security-audit-playbook.md). Pure static enumerators:
      # each pins a security-relevant set (grant write-sites, unauthenticated routes, handler-side
      # authz) against a reviewed baseline and fails when the set grows silently. They prove nothing
      # on their own — they force a reviewer to answer the attenuation / auth-posture question.
      - name: Security tripwire — grant write-sites (capability attenuation review)
        run: bash .github/scripts/audit-grant-sinks.sh

      - name: Security tripwire — route auth posture
        run: bash .github/scripts/audit-route-auth.sh

      - name: Security tripwire — handler-side authz drift
        run: bash .github/scripts/audit-handler-authz-drift.sh

      # Unlike the three above, this one is not only a baseline tripwire: the pairwise-distinctness
      # of the gates' secrets is computed from the source, so UPDATE_BASELINE cannot silence it.
      - name: Security tripwire — internal signature gates use distinct secrets
        run: bash .github/scripts/audit-signature-secrets.sh

      - name: Security tripwire — credential types deriving Debug
        run: bash .github/scripts/audit-credential-debug.sh

      - name: Check documentation builds
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check for unused dependencies
        run: cargo machete --with-metadata

      - name: Security audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit

  # The guards' own tests. Every script above is a bash tripwire whose entire value is that it
  # FAILS when the thing it protects is broken — and nothing about a passing tripwire distinguishes
  # "the invariant holds" from "this script can no longer fail". These harnesses feed each guard a
  # deliberately broken fixture and assert it goes red, which is the only evidence that the green
  # tick above means anything.
  #
  # This job exists because two of these harnesses (test-detect-ci-scope, test-check-openapi-routes)
  # were committed with a `bash …` usage line and wired into NO job — so they ran nowhere, and the
  # guards they cover had no standing proof they still bit. Same rot as `streaming_ingest_test` and
  # the `scenario-schema` feature: a test no job runs is a test that runs nowhere.
  #
  # Pure bash, no toolchain, no services — it is deliberately cheap so there is no reason to scope
  # it away later. Adding a guard means adding its harness HERE, in the same PR.
  guard-tests:
    name: CI Guard Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Guard test — detect-ci-scope
        run: bash .github/scripts/test-detect-ci-scope.sh

      - name: Guard test — check-openapi-routes
        run: bash .github/scripts/test-check-openapi-routes.sh

      - name: Guard test — audit-route-auth (per-builder layer wiring)
        run: bash .github/scripts/test-audit-route-auth.sh

      - name: Guard test — audit-signature-secrets (distinct keys)
        run: bash .github/scripts/test-audit-signature-secrets.sh

      - name: Guard test — audit-credential-debug
        run: bash .github/scripts/test-audit-credential-debug.sh

      - name: Guard test — audit-grant-sinks (SQL half)
        run: bash .github/scripts/test-audit-grant-sinks.sh

      # The gate itself needs cargo, so it runs in rust-quality; this harness stubs the generator
      # and therefore stays pure bash, which is what lets it live in this job at all.
      - name: Guard test — check-ts-rs-drift
        run: bash .github/scripts/test-check-ts-rs-drift.sh

  typescript-quality:
    name: TypeScript Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd packages/temper-cloud && bun install --frozen-lockfile

      - name: Type check
        run: cd packages/temper-cloud && bun run typecheck

      - name: Lint and format check
        run: cd packages/temper-cloud && bun run check
