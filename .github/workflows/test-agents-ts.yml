name: TypeScript SDK & Agent Tests

on:
  workflow_call:

jobs:
  temper-ts:
    name: temper-ts (typecheck, vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: clients/temper-ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # npm, not bun: temper-ts is deliberately NOT a bun workspace member (the root list is exactly
      # temper-cloud + temper-ui), and a root install would inherit the root's overrides.
      - name: Install dependencies
        run: npm ci

      # The never-skipping backstop for the generated schema — the role `test-ruby`'s
      # `rake drift` plays for the gem. `detect-ci-scope.sh` runs this job for an
      # openapi.json change precisely so this step fires on the PR that would break it.
      - name: Schema drift (schema.ts vs openapi.json)
        run: bash ../../.github/scripts/check-temper-ts-drift.sh

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  steward:
    name: steward agent (typecheck, vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: packages/agent-workflows/steward

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # The steward takes temper-ts as a `file:` dependency, so npm symlinks it and its `pretest`
      # hook builds it. Run from INSIDE this directory — a root install fails on the root's bun
      # overrides.
      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  # NOTE: this job does NOT run `npm run build`, so it cannot catch an eve
  # DISCOVERY failure (missing `instructions.md`, an unregistered channel) —
  # those are build-time only, and typecheck/vitest are both blind to them. The
  # steward deploys on merge to `main`, so such a break surfaces as a failed
  # production deploy rather than a red PR. The `mention` job below runs the
  # build for exactly this reason; the steward's job wants the same treatment,
  # left out here only because it is a different agent's narrative.

  mention:
    name: mention agent (typecheck, vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: packages/agent-workflows/mention

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Unlike the steward, this agent has no temper-ts `file:` dependency — nothing to build
      # first, so the install is a plain one. Still run from INSIDE this directory: it is
      # deliberately not a root workspace member, and a root install fails on the root's bun
      # overrides.
      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      # The gate that matters, and the one that was missing: eve resolves the agent by
      # DISCOVERY at build time — authored instructions, channels, routes. A missing
      # `agent/instructions.md` fails the build while typecheck and vitest both stay green,
      # so the first sign of it is a failed Vercel deploy. That is exactly how it shipped
      # once. Build here instead of finding out in prod.
      - name: Build (eve discovery)
        # `agent/connections/temper.ts` resolves TEMPER_MCP_URL at MODULE LOAD, matching the
        # steward. That is deliberate: a missing variable then fails the BUILD rather than the
        # first user turn. Discovery consequently needs the variable PRESENT, not correct —
        # nothing here connects to it. `.invalid` is reserved by RFC 2606 and can never
        # resolve, so this cannot accidentally reach a real host. The deployed value is
        # supplied per-environment.
        env:
          TEMPER_MCP_URL: https://mcp.example.invalid
        run: npm run build
