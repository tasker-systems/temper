# =============================================================================
# Temper — Workspace-Level cargo-make Tasks
# =============================================================================
# Composite tasks that operate across the entire workspace.
# Extended by the root Makefile.toml.

extend = [
    { path = "./base-tasks.toml" },
    { path = "./release-tasks.toml" },
]

# =============================================================================
# Composite Tasks
# =============================================================================

[tasks.check]
description = "Run all quality checks (Rust + TypeScript)"
# Mirrors the `code-quality / Rust Quality` CI job. The OpenAPI gates belong here for the same
# reason the rest do: openapi.json is a committed *product of the router*, so a new route — or merely
# a new field on a response DTO — leaves the committed artifact stale, and nothing else notices.
# Omitting them meant a green local `check` followed by a red CI job; that is what bit PR #348.
# `openapi-rb-drift` extends that same reasoning to the temper-rb generated gem (a product of
# openapi.json), whose drift gate is otherwise CI-only — the exact gap that bit #354. It needs
# Docker and skips without it (the test-ruby CI job is the never-skipping backstop).
# `openapi-ts-drift` does the same for temper-ts's generated schema.ts, and unlike the
# gem's gate it never skips: openapi-typescript needs only Node.
dependencies = [
  "rust-fmt-check",
  "rust-clippy",
  "rust-docs",
  "rust-machete",
  "openapi-check",
  "openapi-routes-check",
  "security-tripwires",
  "openapi-rb-drift",
  "openapi-ts-drift",
  "ts-check"
]

[tasks.security-tripwires]
description = "Run the code-quality security tripwires (grant sinks, route auth, handler authz, signature secrets, credential Debug)"
# These pin security-relevant sets (grant write-sites, unauthenticated routes, handler-side authz
# calls, signature-secret distinctness, credential types deriving Debug) against reviewed baselines.
# They lived ONLY in the `code-quality / Rust Quality` CI job, so a new grant sink / handler-side
# authz call / unauthenticated route passed a green local `cargo make check` and failed in CI —
# exactly the round-trip this task removes. Run all five and report EVERY failure in one pass, not
# just the first, so one `check` surfaces the whole set. Delegates to the same scripts CI runs, so
# local and CI logic are identical (CI cannot call cargo-make: the root Makefile.toml needs a ./.env
# no runner has).
script = ['''
set -u
cd "${CARGO_MAKE_WORKING_DIRECTORY}"
fail=0
for s in audit-grant-sinks audit-route-auth audit-handler-authz-drift audit-signature-secrets audit-credential-debug; do
  echo "--- security tripwire: ${s} ---"
  if ! bash ".github/scripts/${s}.sh"; then fail=1; fi
done
if [ "${fail}" -ne 0 ]; then
  echo "security-tripwires: one or more tripwires failed (see above)." >&2
  exit 1
fi
echo "security-tripwires: all five passed."
''']

[tasks.test-schema]
description = "Run the payload JSON-Schema snapshot gate (no database, no ONNX). Regenerate: UPDATE_SCHEMA=1 cargo make test-schema"
# PACKAGE-SCOPED ON PURPOSE — do NOT fold this into the `--workspace` run below.
#
# The emitted schema DEPENDS ON FEATURE UNIFICATION. Under `--workspace`, temper-core's `mcp` feature
# (schemars derives) unifies in and the id newtypes emit INLINE; under `-p temper-substrate` they
# emit as `$ref`s into `$defs`. Same structs, two different schemas, decided by the cargo invocation.
#
# `-p` is the authoritative shape because it is what the boot-seed stamps into
# `kb_event_types.payload_schema` and what the regen command emits. Gating the workspace shape would
# gate a schema nothing ever stamps.
#
# This ran NOWHERE before 2026-07-16 — no job, no task enabled `scenario-schema` — so it sat RED on
# `main` while three payload fields (`segmented`, `telos_centroid`, `TelosConstants`) shipped with no
# schema and prod's registry described an older payload than the code writes.
command = "cargo"
args = [
  "nextest",
  "run",
  "-p",
  "temper-substrate",
  "--features",
  "scenario-schema",
  "--no-fail-fast"
]

[tasks.test]
description = "Run tests (unit tests, no feature flags) + the payload-schema snapshot gate"
dependencies = ["test-schema"]
command = "cargo"
args = ["nextest", "run", "--workspace", "--no-fail-fast"]

[tasks.test-db]
description = "Run tests including database integration tests (requires Docker Postgres)"
command = "cargo"
args = [
  "nextest",
  "run",
  "--workspace",
  "--features",
  "test-db",
  "--no-fail-fast"
]

[tasks.coverage]
description = "Generate code coverage via llvm-cov + nextest, incl. DB tests (requires Docker Postgres + the llvm-tools-preview rustup component)"
command = "cargo"
args = [
  "llvm-cov",
  "nextest",
  "--workspace",
  "--features",
  "test-db",
  "--no-fail-fast"
]

[tasks.test-all]
description = "Run all test tiers including embedder and TypeScript tests"
dependencies = ["test-all-rust", "ts-test", "ts-test-integration"]

[tasks.test-e2e]
description = "Run E2E tests only (requires Docker Postgres)"
command = "cargo"
args = [
  "nextest",
  "run",
  "--manifest-path",
  "tests/e2e/Cargo.toml",
  "--features",
  "test-db",
  "--no-fail-fast"
]

[tasks.test-e2e-embed]
description = "Run E2E tests with embed pipeline gated on (requires Docker Postgres + ONNX runtime); matches CI's Embed job"
command = "cargo"
args = [
  "nextest",
  "run",
  "--manifest-path",
  "tests/e2e/Cargo.toml",
  "--features",
  "test-db,test-embed",
  "--no-fail-fast"
]

[tasks.test-all-rust]
description = "Run all Rust test tiers"
command = "cargo"
args = [
  "nextest",
  "run",
  "--workspace",
  "--features",
  "test-db,test-embed",
  "--no-fail-fast"
]

[tasks.fix]
description = "Auto-fix formatting and lint issues (Rust + TypeScript)"
dependencies = ["rust-fmt-fix", "rust-clippy-fix", "ts-fix"]

[tasks.build]
description = "Build all workspace crates"
command = "cargo"
args = ["build", "--workspace", "--all-features"]

[tasks.audit]
description = "Run security audit on dependencies"
command = "cargo"
args = ["audit"]

[tasks.run]
description = "Run the temper-api server locally"
command = "cargo"
args = ["run", "-p", "temper-api"]

# =============================================================================
# Sub-Tasks
# =============================================================================

[tasks.rust-fmt-check]
description = "Check Rust formatting"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.rust-fmt-fix]
description = "Fix Rust formatting"
command = "cargo"
args = ["fmt", "--all"]

[tasks.rust-clippy]
description = "Run Clippy lints"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.rust-clippy-fix]
description = "Fix Clippy issues"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--fix",
  "--allow-dirty",
  "--allow-staged"
]

[tasks.rust-docs]
description = "Check documentation builds (RUSTDOCFLAGS=-D warnings, matching CI)"
command = "cargo"
args = ["doc", "--workspace", "--no-deps", "--document-private-items"]
# Match CI's code-quality job: rustdoc warnings (broken intra-doc links, bare
# URLs, etc.) fail the build locally before they reach CI. The global
# SQLX_OFFLINE=true keeps temper-substrate's namespaced macros resolving from its
# per-crate .sqlx cache, so a single --workspace pass suffices (mirrors how
# rust-clippy is run locally; CI splits temper-substrate only to avoid double-linting).
env = { RUSTDOCFLAGS = "-D warnings" }

[tasks.rust-machete]
description = "Check for unused Cargo dependencies"
command = "cargo"
args = ["machete", "--with-metadata"]

# =============================================================================
# TypeScript Tasks (packages/temper-cloud)
# =============================================================================

[tasks.ts-check]
description = "Run TypeScript quality checks (typecheck + biome)"
dependencies = ["ts-typecheck", "ts-lint"]

[tasks.ts-typecheck]
description = "TypeScript type checking"
cwd = "packages/temper-cloud"
command = "bun"
args = ["run", "typecheck"]

[tasks.ts-lint]
description = "TypeScript lint and format check (biome)"
cwd = "packages/temper-cloud"
command = "bun"
args = ["run", "check"]

[tasks.ts-fix]
description = "Auto-fix TypeScript formatting and lint issues"
cwd = "packages/temper-cloud"
command = "bun"
args = ["run", "check:fix"]

[tasks.ts-test]
description = "Run TypeScript unit tests"
cwd = "packages/temper-cloud"
command = "bun"
args = ["run", "test"]

[tasks.ts-test-integration]
description = "Run TypeScript integration tests (requires Docker Postgres)"
cwd = "packages/temper-cloud"
command = "bun"
args = ["run", "test:integration"]

# =============================================================================
# Code Generation Tasks
# =============================================================================

[tasks.generate-ts-types]
description = "Generate TypeScript types from temper-core Rust structs via ts-rs"
script = [
  "mkdir -p ${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated",
  "TS_RS_EXPORT_DIR=${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated cargo test -p temper-core --features typescript",
  "TS_RS_EXPORT_DIR=${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated cargo test -p temper-workflow --features typescript",
  "TS_RS_EXPORT_DIR=${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated cargo test -p temper-agents --features typescript",
  # ts-rs emits one export test per crate, so a crate absent from this list contributes nothing —
  # temper-principal owns `Refusal`/`Standing`/`ActorAuthority`, which `SystemAccessDetails` imports.
  "TS_RS_EXPORT_DIR=${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated cargo test -p temper-principal --features typescript",
  "generated=$(ls ${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated/*.ts 2>/dev/null | wc -l | tr -d ' ')",
  "if [ \"$generated\" -eq 0 ]; then echo 'ERROR: No TypeScript files were generated'; exit 1; fi",
  "echo \"TypeScript types generated: $generated file(s) in packages/temper-ui/src/lib/types/generated/\"",
  "ls ${CARGO_MAKE_WORKING_DIRECTORY}/packages/temper-ui/src/lib/types/generated/*.ts"
]

[tasks.openapi]
description = "Emit the OpenAPI contract + regenerate the temper-rb gem and temper-ts schema (all products of the router)"
# openapi.json, the temper-rb generated core, AND temper-ts's generated schema.ts are
# all products of the router: a new DTO field restales all three. Regenerating them
# together is what keeps them in lockstep, so following openapi-check's "run cargo make
# openapi" remedy fixes both SDKs too (the exact gap that bit #354). Gem regen needs
# Docker; when it is absent this still emits the spec and the TS schema, and points at
# `cargo make openapi-rb` for later. The TS schema needs only Node, so it never skips.
script = [
  "out=${CARGO_MAKE_WORKING_DIRECTORY}/openapi.json",
  "cargo run --quiet -p temper-api --bin emit-openapi > \"$out\"",
  "if [ ! -s \"$out\" ]; then echo 'ERROR: openapi.json is missing or empty'; exit 1; fi",
  "echo \"OpenAPI spec written: $out ($(wc -c < \"$out\" | tr -d ' ') bytes)\"",
  "if docker info >/dev/null 2>&1; then bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/generate-temper-rb.sh && echo 'temper-rb gem regenerated'; else echo 'NOTE: Docker unavailable — skipped temper-rb gem regen; run cargo make openapi-rb once Docker is up.'; fi",
  "bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/generate-temper-ts.sh && echo 'temper-ts schema regenerated'"
]

[tasks.openapi-rb]
description = "Regenerate the temper-rb gem from openapi.json (requires Docker)"
script = ["bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/generate-temper-rb.sh"]

[tasks.openapi-rb-drift]
description = "Fail if the committed temper-rb generated core drifts from openapi.json (skips without Docker)"
# The local mirror of the test-ruby CI job's `rake drift`. In `check` so a DTO
# change cannot pass a green local gate and then redden Ruby CI. Skips (does not
# fail) when Docker is absent; the CI ruby job is the never-skipping backstop.
script = ["bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/check-temper-rb-drift.sh"]

[tasks.openapi-ts]
description = "Regenerate temper-ts's schema.ts from openapi.json (needs Node)"
script = ["bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/generate-temper-ts.sh"]

[tasks.openapi-ts-drift]
description = "Fail if the committed temper-ts schema drifts from openapi.json"
# The local mirror of the temper-ts CI job's drift step, and the sibling of
# openapi-rb-drift. Unlike that one it NEVER skips: openapi-typescript needs only
# Node, so there is no environment in which we would rather guess than check.
script = ["bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/check-temper-ts-drift.sh"]

[tasks.openapi-check]
description = "Verify the committed openapi.json matches a fresh emission from the router"
# Delegates to the script so CI and local dev run identical logic. CI cannot call
# cargo-make at all: the root Makefile.toml requires a ./.env that no runner has.
script = ["bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/check-openapi-spec.sh"]

[tasks.openapi-routes-check]
description = "Verify every plain .route(...) mount is on the operator-only allowlist"
script = ["bash ${CARGO_MAKE_WORKING_DIRECTORY}/.github/scripts/check-openapi-routes.sh"]

[tasks.openapi-validate]
description = "Validate the committed openapi.json with openapi-generator (requires Docker)"
# Deliberately NOT a CI gate. It pulls a ~1GB image for the same signal that
# `openapi::tests::every_schema_ref_resolves` and
# `openapi::tests::operation_ids_are_present_and_unique` give in milliseconds --
# those two tests guard the defects we know about (dangling $refs, duplicate
# operationIds). This task catches the ones we don't: run it when changing the
# shape of the contract, and before cutting a client SDK.
script = [
  "docker run --rm -v ${CARGO_MAKE_WORKING_DIRECTORY}:/local openapitools/openapi-generator-cli validate -i /local/openapi.json"
]

# =============================================================================
# Docker Tasks
# =============================================================================

[tasks.docker-up]
description = "Start PostgreSQL development database"
script = ["docker compose up -d"]

[tasks.docker-down]
description = "Stop PostgreSQL development database"
script = ["docker compose down"]

[tasks.docker-down-volumes]
description = "Stop PostgreSQL and remove data volumes"
script = ["docker compose down -v"]
