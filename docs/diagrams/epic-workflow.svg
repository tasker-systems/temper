<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arr3d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
  </defs>

  <rect width="500" height="480" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <rect x="160" y="10" width="180" height="30" rx="15" fill="#f3e8ff" stroke="#c4b5fd" stroke-width="1.5" />
  <text x="250" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">Epic Workflow</text>

  <!-- Initial session -->
  <rect x="30" y="55" width="440" height="210" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="4,3" />
  <text x="50" y="73" font-size="10" font-weight="600" fill="#7c3aed">INITIAL SESSION</text>

  <!-- Step 1 -->
  <rect x="125" y="82" width="250" height="30" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="250" y="101" text-anchor="middle" font-size="11" fill="#6b21a8">Deep discovery (search + context)</text>
  <line x1="250" y1="112" x2="250" y2="124" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)" />

  <!-- Step 2 -->
  <rect x="105" y="128" width="290" height="30" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="250" y="147" text-anchor="middle" font-size="11" fill="#6b21a8">Brainstorm (map the problem space)</text>
  <line x1="250" y1="158" x2="250" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)" />

  <!-- Step 3 -->
  <rect x="115" y="174" width="270" height="30" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="250" y="193" text-anchor="middle" font-size="11" fill="#6b21a8">Produce milestone roadmap</text>
  <line x1="250" y1="204" x2="250" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)" />

  <!-- Step 4 -->
  <rect x="105" y="220" width="290" height="30" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="250" y="239" text-anchor="middle" font-size="11" fill="#6b21a8">Create FIRST actionable ticket</text>

  <!-- Virtuous cycle -->
  <rect x="30" y="290" width="440" height="170" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" />
  <text x="50" y="308" font-size="10" font-weight="600" fill="#7c3aed">SUBSEQUENT SESSIONS (virtuous cycle)</text>

  <!-- Cycle steps -->
  <rect x="60" y="320" width="160" height="28" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="140" y="338" text-anchor="middle" font-size="10" fill="#6b21a8">Work current ticket</text>

  <rect x="60" y="358" width="160" height="28" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="140" y="376" text-anchor="middle" font-size="10" fill="#6b21a8">Learn from results</text>

  <rect x="280" y="358" width="170" height="28" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="365" y="376" text-anchor="middle" font-size="10" fill="#6b21a8">Evolve the roadmap</text>

  <rect x="280" y="320" width="170" height="28" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" />
  <text x="365" y="338" text-anchor="middle" font-size="10" fill="#6b21a8">Create next ticket</text>

  <!-- Cycle arrows -->
  <line x1="220" y1="334" x2="275" y2="334" stroke="#a78bfa" stroke-width="1.5" />
  <polygon points="275 330, 280 334, 275 338" fill="#a78bfa" />

  <line x1="365" y1="348" x2="365" y2="354" stroke="#a78bfa" stroke-width="1.5" />
  <polygon points="361 354, 365 358, 369 354" fill="#a78bfa" />

  <line x1="280" y1="372" x2="225" y2="372" stroke="#a78bfa" stroke-width="1.5" />
  <polygon points="225 368, 220 372, 225 376" fill="#a78bfa" />

  <line x1="140" y1="348" x2="140" y2="354" stroke="#a78bfa" stroke-width="1.5" />
  <polygon points="136 354, 140 358, 144 354" fill="#a78bfa" />

  <!-- Principle -->
  <text x="250" y="420" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">Roadmap guides work — not ticket-spread.</text>
  <text x="250" y="435" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">One ticket at a time, grounded in learnings.</text>

  <!-- Arrow from initial to cycle -->
  <line x1="250" y1="265" x2="250" y2="286" stroke="#555" stroke-width="1.5" marker-end="url(#arr3)" />
</svg>
