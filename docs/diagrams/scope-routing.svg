<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Scope-Based Workflow Routing</text>

  <!-- ticket start box -->
  <rect x="255" y="52" width="190" height="40" rx="6" fill="#2563eb" />
  <text x="350" y="77" text-anchor="middle" font-size="13" fill="white" font-weight="500">temper ticket start</text>

  <!-- Arrow down to diamond -->
  <line x1="350" y1="92" x2="350" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Scope set? diamond -->
  <polygon points="350,120 420,155 350,190 280,155" fill="#f8fafc" stroke="#555" stroke-width="1.5" />
  <text x="350" y="159" text-anchor="middle" font-size="11" fill="#333">scope set?</text>

  <!-- No branch - ask user -->
  <line x1="420" y1="155" x2="530" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="475" y="148" text-anchor="middle" font-size="10" fill="#888">no</text>
  <rect x="540" y="137" width="140" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
  <text x="610" y="158" text-anchor="middle" font-size="11" fill="#475569">Ask user, set scope</text>
  <path d="M 610 173 Q 610 200 490 200 Q 370 200 350 190" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" />

  <!-- Yes branch down -->
  <line x1="350" y1="190" x2="350" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="360" y="210" font-size="10" fill="#888">yes</text>

  <!-- Three branches -->
  <!-- Patch -->
  <line x1="350" y1="230" x2="120" y2="230" stroke="#555" stroke-width="1.5" />
  <line x1="120" y1="230" x2="120" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <rect x="40" y="275" width="160" height="80" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" />
  <text x="120" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">patch</text>
  <text x="120" y="316" text-anchor="middle" font-size="11" fill="#15803d">Just do it</text>
  <text x="120" y="332" text-anchor="middle" font-size="10" fill="#166534">No brainstorming</text>
  <text x="120" y="346" text-anchor="middle" font-size="10" fill="#166534">Output: code</text>

  <!-- Feature -->
  <line x1="350" y1="230" x2="350" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <rect x="270" y="275" width="160" height="80" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="350" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">feature</text>
  <text x="350" y="316" text-anchor="middle" font-size="11" fill="#2563eb">Full pipeline</text>
  <text x="350" y="332" text-anchor="middle" font-size="10" fill="#1e40af">Brainstorm + design</text>
  <text x="350" y="346" text-anchor="middle" font-size="10" fill="#1e40af">Output: code + spec</text>

  <!-- Epic -->
  <line x1="350" y1="230" x2="580" y2="230" stroke="#555" stroke-width="1.5" />
  <line x1="580" y1="230" x2="580" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <rect x="500" y="275" width="160" height="80" rx="8" fill="#f3e8ff" stroke="#c4b5fd" stroke-width="1.5" />
  <text x="580" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#6b21a8">epic</text>
  <text x="580" y="316" text-anchor="middle" font-size="11" fill="#7c3aed">Strategic planning</text>
  <text x="580" y="332" text-anchor="middle" font-size="10" fill="#6b21a8">Map problem space</text>
  <text x="580" y="346" text-anchor="middle" font-size="10" fill="#6b21a8">Output: roadmap</text>
</svg>
