<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="cyc-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.45)" />
    </marker>
    <marker id="cyc-arrow-accent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7eb8da" />
    </marker>
  </defs>

  <rect width="700" height="420" rx="8" fill="#0c0c11" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e4df">Session Continuity Cycle</text>
  <text x="350" y="50" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)">Each session builds on the last — context compounds over time</text>

  <!-- Session N-1 (faded) -->
  <rect x="30" y="80" width="170" height="140" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3" />
  <text x="115" y="105" text-anchor="middle" font-size="12" font-weight="500" fill="rgba(255,255,255,0.40)">Previous Session</text>
  <text x="115" y="130" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Decisions made</text>
  <text x="115" y="148" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Tasks updated</text>
  <text x="115" y="166" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Session note saved</text>
  <text x="115" y="184" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Next steps recorded</text>
  <text x="115" y="206" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(255,255,255,0.45)">session note</text>

  <line x1="200" y1="150" x2="238" y2="150" stroke="rgba(255,255,255,0.40)" stroke-width="1.5" marker-end="url(#cyc-arrow)" />

  <!-- Central Vault -->
  <rect x="245" y="75" width="210" height="155" rx="10" fill="rgba(126,184,218,0.08)" stroke="rgba(126,184,218,0.40)" stroke-width="2" />
  <text x="350" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#7eb8da">Vault</text>
  <line x1="270" y1="110" x2="430" y2="110" stroke="rgba(126,184,218,0.40)" stroke-width="1" />
  <text x="350" y="130" text-anchor="middle" font-size="10" fill="#7eb8da">Goals (vision)</text>
  <text x="350" y="148" text-anchor="middle" font-size="10" fill="#7eb8da">Tasks (active)</text>
  <text x="350" y="166" text-anchor="middle" font-size="10" fill="#7eb8da">Session notes (history)</text>
  <text x="350" y="184" text-anchor="middle" font-size="10" fill="#7eb8da">Decisions + research</text>
  <text x="350" y="202" text-anchor="middle" font-size="10" fill="#7eb8da">Search index (vectors)</text>

  <!-- Arrow: Vault -> Warmup -->
  <line x1="350" y1="230" x2="350" y2="265" stroke="#7eb8da" stroke-width="2" marker-end="url(#cyc-arrow-accent)" />

  <!-- Step 1: Warmup -->
  <rect x="240" y="270" width="220" height="40" rx="6" fill="#7eb8da" />
  <text x="350" y="293" text-anchor="middle" font-size="12" fill="#0a0a0f" font-weight="500">1. temper warmup</text>
  <text x="350" y="303" text-anchor="middle" font-size="9" fill="rgba(10,10,15,0.55)">Inject context into new session</text>

  <line x1="350" y1="310" x2="350" y2="330" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" marker-end="url(#cyc-arrow)" />

  <!-- Step 2: Work -->
  <rect x="240" y="333" width="220" height="35" rx="6" fill="rgba(130,201,154,0.10)" stroke="rgba(130,201,154,0.40)" stroke-width="1.5" />
  <text x="350" y="354" text-anchor="middle" font-size="12" fill="#82c99a" font-weight="500">2. Work (build or plan)</text>

  <line x1="350" y1="368" x2="350" y2="383" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" marker-end="url(#cyc-arrow)" />

  <!-- Step 3: Record -->
  <rect x="240" y="386" width="220" height="25" rx="6" fill="rgba(240,168,112,0.10)" stroke="rgba(240,168,112,0.40)" stroke-width="1.5" />
  <text x="350" y="403" text-anchor="middle" font-size="12" fill="#f0a870" font-weight="500">3. write session + update task</text>

  <!-- Return arrow back to vault -->
  <path d="M 460 398 Q 530 398 530 250 Q 530 152 455 152" fill="none" stroke="#7eb8da" stroke-width="2" marker-end="url(#cyc-arrow-accent)" />
  <text x="548" y="270" font-size="10" fill="#7eb8da" font-weight="500" transform="rotate(90, 548, 270)">feeds back</text>

  <!-- Session N+1 (faded, future) -->
  <rect x="500" y="290" width="170" height="100" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3" />
  <text x="585" y="315" text-anchor="middle" font-size="12" font-weight="500" fill="rgba(255,255,255,0.40)">Next Session</text>
  <text x="585" y="338" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Richer context</text>
  <text x="585" y="356" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Knows what changed</text>
  <text x="585" y="374" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.40)">Picks up throughline</text>

  <!-- Virtuous cycle label -->
  <text x="38" y="260" font-size="11" font-weight="600" fill="#7eb8da">Virtuous</text>
  <text x="50" y="275" font-size="11" font-weight="600" fill="#7eb8da">Cycle</text>
  <text x="30" y="298" font-size="9" fill="rgba(255,255,255,0.45)">More sessions =</text>
  <text x="30" y="311" font-size="9" fill="rgba(255,255,255,0.45)">richer context =</text>
  <text x="30" y="324" font-size="9" fill="rgba(255,255,255,0.45)">better throughline</text>
</svg>
