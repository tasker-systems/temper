<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>

  <rect width="500" height="280" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <rect x="160" y="10" width="180" height="30" rx="15" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" />
  <text x="250" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Patch Workflow</text>

  <!-- Step 1 -->
  <rect x="175" y="55" width="150" height="32" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="250" y="75" text-anchor="middle" font-size="11" fill="#166534">Read ticket</text>
  <line x1="250" y1="87" x2="250" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Step 2 -->
  <rect x="155" y="107" width="190" height="32" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="250" y="127" text-anchor="middle" font-size="11" fill="#166534">Implement with tests</text>
  <line x1="250" y1="139" x2="250" y2="154" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Step 3 -->
  <rect x="145" y="159" width="210" height="32" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="250" y="179" text-anchor="middle" font-size="11" fill="#166534">cargo test + cargo clippy</text>
  <line x1="250" y1="191" x2="250" y2="206" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Step 4 -->
  <rect x="140" y="211" width="220" height="32" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="250" y="231" text-anchor="middle" font-size="11" fill="#166534">Commit + session save --state done</text>

  <!-- No spec callout -->
  <text x="410" y="130" font-size="10" fill="#94a3b8" font-style="italic">No spec</text>
  <text x="410" y="145" font-size="10" fill="#94a3b8" font-style="italic">No plan</text>
  <text x="410" y="160" font-size="10" fill="#94a3b8" font-style="italic">No brainstorming</text>
</svg>
