<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>

  <rect width="500" height="420" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <rect x="160" y="10" width="180" height="30" rx="15" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="250" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Feature Workflow</text>

  <!-- Step 1: Discovery -->
  <rect x="140" y="55" width="220" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="75" text-anchor="middle" font-size="11" fill="#1e40af">temper search + context</text>
  <line x1="250" y1="87" x2="250" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)" />

  <!-- Step 2: Brainstorm -->
  <rect x="130" y="107" width="240" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="127" text-anchor="middle" font-size="11" fill="#1e40af">Brainstorm (design the solution)</text>
  <line x1="250" y1="139" x2="250" y2="154" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)" />

  <!-- Step 3: Design spec -->
  <rect x="155" y="159" width="190" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="179" text-anchor="middle" font-size="11" fill="#1e40af">Produce design spec</text>
  <line x1="250" y1="191" x2="250" y2="206" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)" />

  <!-- Step 4: Plan -->
  <rect x="130" y="211" width="240" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="231" text-anchor="middle" font-size="11" fill="#1e40af">Create implementation plan</text>
  <line x1="250" y1="243" x2="250" y2="258" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)" />

  <!-- Step 5: Implement -->
  <rect x="140" y="263" width="220" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="283" text-anchor="middle" font-size="11" fill="#1e40af">Implement via plan execution</text>
  <line x1="250" y1="295" x2="250" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)" />

  <!-- Step 6: Verify -->
  <rect x="125" y="315" width="250" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="335" text-anchor="middle" font-size="11" fill="#1e40af">Full verification (test, clippy, fmt)</text>
  <line x1="250" y1="347" x2="250" y2="362" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)" />

  <!-- Step 7: Done -->
  <rect x="125" y="367" width="250" height="32" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" />
  <text x="250" y="387" text-anchor="middle" font-size="11" fill="#1e40af">Commit + session save --state done</text>

  <!-- Artifacts callout -->
  <text x="410" y="180" font-size="10" fill="#94a3b8" font-style="italic">Spec doc</text>
  <text x="410" y="235" font-size="10" fill="#94a3b8" font-style="italic">Plan doc</text>
  <text x="410" y="287" font-size="10" fill="#94a3b8" font-style="italic">Delivered code</text>
</svg>
