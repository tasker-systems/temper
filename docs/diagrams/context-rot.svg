<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 370" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="cr-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="rgba(255,255,255,0.45)" />
    </marker>
    <marker id="cr-arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e89a9a" />
    </marker>
    <marker id="cr-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#82c99a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="370" rx="8" fill="#0c0c11" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e4df">Context Rot: The Problem and the Fix</text>

  <!-- LEFT SIDE: Without a knowledge base -->
  <rect x="15" y="48" width="335" height="310" rx="8" fill="rgba(224,108,108,0.06)" stroke="rgba(240,150,150,0.45)" stroke-width="1.5" />
  <text x="182" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="rgba(240,150,150,0.90)">Without a knowledge base</text>

  <!-- Session boxes (left) -->
  <rect x="35" y="85" width="130" height="50" rx="6" fill="rgba(224,108,108,0.10)" stroke="rgba(240,150,150,0.45)" stroke-width="1" />
  <text x="100" y="105" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(240,150,150,0.90)">Session 1</text>
  <text x="100" y="120" text-anchor="middle" font-size="9" fill="rgba(240,150,150,0.65)">Builds context</text>

  <rect x="35" y="155" width="130" height="50" rx="6" fill="rgba(224,108,108,0.10)" stroke="rgba(240,150,150,0.45)" stroke-width="1" />
  <text x="100" y="175" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(240,150,150,0.90)">Session 2</text>
  <text x="100" y="190" text-anchor="middle" font-size="9" fill="rgba(240,150,150,0.65)">Starts from scratch</text>

  <rect x="35" y="225" width="130" height="50" rx="6" fill="rgba(224,108,108,0.10)" stroke="rgba(240,150,150,0.45)" stroke-width="1" />
  <text x="100" y="245" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(240,150,150,0.90)">Session 3</text>
  <text x="100" y="260" text-anchor="middle" font-size="9" fill="rgba(240,150,150,0.65)">Starts from scratch</text>

  <!-- Red X between sessions -->
  <text x="100" y="147" text-anchor="middle" font-size="14" font-weight="700" fill="#e89a9a">context lost</text>
  <text x="100" y="217" text-anchor="middle" font-size="14" font-weight="700" fill="#e89a9a">context lost</text>

  <!-- Degradation arrow -->
  <text x="205" y="105" font-size="10" fill="rgba(240,150,150,0.90)">Understanding</text>
  <rect x="270" y="95" width="60" height="12" rx="3" fill="#82c99a" />
  <text x="205" y="180" font-size="10" fill="rgba(240,150,150,0.90)">Understanding</text>
  <rect x="270" y="170" width="35" height="12" rx="3" fill="#f0a870" />
  <text x="205" y="250" font-size="10" fill="rgba(240,150,150,0.90)">Understanding</text>
  <rect x="270" y="240" width="18" height="12" rx="3" fill="#e07d7d" />

  <!-- Summary text left -->
  <text x="182" y="302" text-anchor="middle" font-size="10" fill="rgba(240,150,150,0.90)">Each session re-explains context.</text>
  <text x="182" y="316" text-anchor="middle" font-size="10" fill="rgba(240,150,150,0.90)">Decisions are forgotten. Mistakes repeat.</text>
  <text x="182" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#e89a9a">Context degrades over time</text>

  <!-- RIGHT SIDE: With Temper -->
  <rect x="370" y="48" width="335" height="310" rx="8" fill="rgba(130,201,154,0.06)" stroke="rgba(130,201,154,0.45)" stroke-width="1.5" />
  <text x="537" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#82c99a">With Temper</text>

  <!-- Central vault -->
  <rect x="490" y="120" width="100" height="160" rx="8" fill="rgba(126,184,218,0.08)" stroke="rgba(126,184,218,0.45)" stroke-width="2" />
  <text x="540" y="145" text-anchor="middle" font-size="11" font-weight="600" fill="#7eb8da">Vault</text>
  <line x1="500" y1="152" x2="580" y2="152" stroke="rgba(126,184,218,0.45)" stroke-width="1" />
  <text x="540" y="170" text-anchor="middle" font-size="8" fill="rgba(126,184,218,0.78)">Goals</text>
  <text x="540" y="183" text-anchor="middle" font-size="8" fill="rgba(126,184,218,0.78)">Tasks</text>
  <text x="540" y="196" text-anchor="middle" font-size="8" fill="rgba(126,184,218,0.78)">Sessions</text>
  <text x="540" y="209" text-anchor="middle" font-size="8" fill="rgba(126,184,218,0.78)">Research</text>
  <text x="540" y="222" text-anchor="middle" font-size="8" fill="rgba(126,184,218,0.78)">Search index</text>

  <!-- Session boxes (right) -->
  <rect x="385" y="90" width="85" height="40" rx="6" fill="rgba(130,201,154,0.10)" stroke="rgba(130,201,154,0.45)" stroke-width="1" />
  <text x="427" y="110" text-anchor="middle" font-size="10" font-weight="500" fill="#82c99a">Session 1</text>
  <text x="427" y="122" text-anchor="middle" font-size="8" fill="rgba(130,201,154,0.70)">warm + save</text>

  <rect x="385" y="160" width="85" height="40" rx="6" fill="rgba(130,201,154,0.10)" stroke="rgba(130,201,154,0.45)" stroke-width="1" />
  <text x="427" y="180" text-anchor="middle" font-size="10" font-weight="500" fill="#82c99a">Session 2</text>
  <text x="427" y="192" text-anchor="middle" font-size="8" fill="rgba(130,201,154,0.70)">warm + save</text>

  <rect x="385" y="230" width="85" height="40" rx="6" fill="rgba(130,201,154,0.10)" stroke="rgba(130,201,154,0.45)" stroke-width="1" />
  <text x="427" y="250" text-anchor="middle" font-size="10" font-weight="500" fill="#82c99a">Session 3</text>
  <text x="427" y="262" text-anchor="middle" font-size="8" fill="rgba(130,201,154,0.70)">warm + save</text>

  <!-- Arrows: sessions <-> vault -->
  <line x1="470" y1="110" x2="488" y2="140" stroke="#82c99a" stroke-width="1.5" marker-end="url(#cr-arrow-green)" />
  <line x1="470" y1="180" x2="488" y2="190" stroke="#82c99a" stroke-width="1.5" marker-end="url(#cr-arrow-green)" />
  <line x1="470" y1="250" x2="488" y2="240" stroke="#82c99a" stroke-width="1.5" marker-end="url(#cr-arrow-green)" />

  <!-- Growing understanding bars -->
  <text x="607" y="105" font-size="10" fill="#82c99a">Understanding</text>
  <rect x="607" y="110" width="60" height="12" rx="3" fill="#82c99a" />
  <text x="607" y="177" font-size="10" fill="#82c99a">Understanding</text>
  <rect x="607" y="182" width="75" height="12" rx="3" fill="#82c99a" />
  <text x="607" y="247" font-size="10" fill="#82c99a">Understanding</text>
  <rect x="607" y="252" width="90" height="12" rx="3" fill="#82c99a" />

  <!-- Summary text right -->
  <text x="537" y="302" text-anchor="middle" font-size="10" fill="#82c99a">Each session reads and writes back.</text>
  <text x="537" y="316" text-anchor="middle" font-size="10" fill="#82c99a">Decisions persist. Throughline grows.</text>
  <text x="537" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#82c99a">Context compounds over time</text>
</svg>
