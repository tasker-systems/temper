# =============================================================================
# Temper — cargo-make Root Task Definitions
# =============================================================================
#
# Unified task runner for the temper workspace.
#
# Quick Start:
#   cargo make check       Run all quality checks
#   cargo make test        Run all tests (unit only)
#   cargo make test-db     Run tests with database (requires Docker)
#   cargo make test-all    Run all test tiers
#   cargo make fix         Auto-fix all issues
#   cargo make build       Build everything
#   cargo make audit       Security audit
#   cargo make run         Run temper-api locally
#
# Docker:
#   cargo make docker-up   Start PostgreSQL
#   cargo make docker-down Stop PostgreSQL
#
# Dev Data:
#   cargo make seed        Seed local DB with UI preview data
#
# See: docs/superpowers/specs/2026-03-28-cargo-make-tooling-and-security-audit-design.md

extend = "./tools/cargo-make/main.toml"

# Load `.env` for every task. This is the dev-only path for env vars like
# DATABASE_URL, AUTH0_*, SESSION_SECRET — production deployments (Vercel) set
# their env vars natively and never go through cargo-make. The `.env` file is
# gitignored; copy from `.env.template` to bootstrap.
env_files = ["./.env"]

[env]
# Compile sqlx query! macros against the committed per-crate .sqlx caches, not the live DB — matches CI
# (which sets SQLX_OFFLINE=true) and is REQUIRED for temper-substrate, whose macros target the `temper_next`
# artifact namespace that isn't on the dev DB's default search_path. Compile-time only; runtime DB tests
# (test-db/test-e2e) still connect normally. `prepare-next` overrides this (it must introspect live).
SQLX_OFFLINE = "true"

[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.default]
description = "Default: show available tasks"
script = '''
echo "Temper — cargo-make Tasks"
echo "========================="
echo ""
echo "Quality:"
echo "  cargo make check       Run all quality checks (Rust + TypeScript)"
echo "  cargo make fix         Auto-fix formatting and lint issues"
echo "  cargo make audit       Security audit on dependencies"
echo ""
echo "Testing:"
echo "  cargo make test        Rust unit tests (no feature flags)"
echo "  cargo make test-db     + database integration tests (requires Docker Postgres)"
echo "  cargo make test-all    All tests: Rust + TypeScript + integration"
echo "  cargo make ts-test     TypeScript unit tests only"
echo ""
echo "Build & Run:"
echo "  cargo make build              Build all workspace crates"
echo "  cargo make run                Run temper-api server locally"
echo "  cargo make generate-ts-types  Generate TypeScript types from Rust via ts-rs"
echo ""
echo "Docker:"
echo "  cargo make docker-up   Start PostgreSQL"
echo "  cargo make docker-down Stop PostgreSQL"
echo ""
echo "Dev Data:"
echo "  cargo make seed        Seed local DB with UI preview data"
echo ""
echo "Run 'cargo make --list-all-steps' for all tasks"
'''

[tasks.prepare-next]
description = "Regenerate temper-substrate's per-crate .sqlx cache against the loaded temper_next artifact"
env = { SQLX_OFFLINE = "false" }   # prepare must introspect the LIVE artifact to build the cache
script = '''
# temper-substrate's sqlx! macros resolve against the temper_next artifact NAMESPACE (not the migrated
# public schema), so prepare needs the artifact loaded + search_path set. Per-crate (run from the
# crate dir) — NOT `--workspace`, which clobbers per-crate caches.
DB="${DATABASE_URL:-postgresql://temper:temper@localhost:5437/temper_development}"
# Build the temper_next namespace from the canonical baseline, mirroring the test harness'
# load_files (tests/common/mod.rs): the test-only namespace-reset fixture owns the DROP/CREATE, then
# the namespace-free baseline body files from migrations/ are loaded under PGOPTIONS so their
# unqualified DDL lands in temper_next (not public).
FIX="crates/temper-substrate/tests/fixtures"
psql "$DB" -v ON_ERROR_STOP=1 -f "$FIX/00_namespace_reset.sql" >/dev/null
for f in migrations/20260624000001_canonical_schema.sql migrations/20260624000002_canonical_functions.sql; do
  PGOPTIONS="-csearch_path=temper_next,public" psql "$DB" -v ON_ERROR_STOP=1 -f "$f" >/dev/null
done
cd crates/temper-substrate
DATABASE_URL="${DB}?options=-csearch_path%3Dtemper_next,public" cargo sqlx prepare
'''

[tasks.test-next]
description = "Run temper-substrate scenario write-path artifact-tests in an isolated temper_next namespace."
# The tests load the canonical baseline (migrations/) into a temper_next test namespace and reset it
# per test. Post-collapse `substrate::connect()` uses the connection-default search_path (public, the
# production shape), so the test runtime MUST point the pool at temper_next via the search_path option
# — otherwise the pool resolves against the public substrate and writes collide. SQLX_OFFLINE uses the
# committed temper_next-bound cache (regenerate with `cargo make prepare-next` after touching SQL).
env = { SQLX_OFFLINE = "true", DATABASE_URL = "postgresql://temper:temper@localhost:5437/temper_development?options=-csearch_path%3Dtemper_next,public" }
script = '''
cargo nextest run -p temper-substrate --features artifact-tests
'''

[tasks.prepare-api]
description = "Regenerate temper-api's per-crate .sqlx cache (--all-targets: includes test-target queries)"
env = { SQLX_OFFLINE = "false" }   # prepare must introspect the live dev DB to build the cache
script = '''
# Per-crate (run from the crate dir) — NOT `--workspace`, which clobbers per-crate caches.
# `--all-targets` captures test-target macro queries (relationship_*_test), which the offline
# clippy sweep in `cargo make check` compiles but plain `cargo sqlx prepare` misses.
cd crates/temper-api
cargo sqlx prepare -- --all-targets --all-features
'''

[tasks.prepare-e2e]
description = "Regenerate temper-e2e's per-crate .sqlx cache (--all-targets: test-target queries)"
env = { SQLX_OFFLINE = "false" }   # prepare must introspect the live dev DB to build the cache
script = '''
# The e2e crate's macro queries all live in test targets, so `--all-targets` is what makes
# this cache non-empty. Per-crate — never `--workspace` (clobbers per-crate caches).
cd tests/e2e
cargo sqlx prepare -- --all-targets --all-features
'''

[tasks.seed]
description = "Seed local dev database with UI preview data. Pass email: cargo make seed you@example.com"
script = '''
# Resolve email: first arg > SEED_EMAIL env var > default in SQL
EMAIL="${1:-${SEED_EMAIL:-}}"
if [ -n "$EMAIL" ]; then
  psql "${DATABASE_URL}" -v seed_email="'${EMAIL}'" -f scripts/seed-dev-data.sql
else
  psql "${DATABASE_URL}" -f scripts/seed-dev-data.sql
fi
'''

[tasks.db-collapsed]
description = "Build the canonical substrate in public for collapsed-schema dev."
env = { SQLX_OFFLINE = "false" }
script = '''
# Collapsed-schema dev: the substrate IS public. Build it from the 3-file canonical
# baseline under the connection-default search_path, so de-qualified SQL resolves to
# public — exactly the production shape. The baseline self-provisions the vector
# extension and the uuid generator (no CREATE EXTENSION needed here).
DB="${DATABASE_URL:-postgresql://temper:temper@localhost:5437/temper_development}"
psql "$DB" -v ON_ERROR_STOP=1 -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
for f in migrations/20260624000001_canonical_schema.sql \
         migrations/20260624000002_canonical_functions.sql \
         migrations/20260624000003_canonical_seed.sql; do
  psql "$DB" -v ON_ERROR_STOP=1 -f "$f" >/dev/null
done
echo "substrate built in public. export DATABASE_URL=\"$DB\" (no search_path option needed)."
'''
