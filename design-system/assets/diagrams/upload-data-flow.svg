<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"></path>
    </marker>
    <marker id="arr-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fff"></path>
    </marker>
  </defs>

  
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Upload Data Flow — From File to Searchable Chunks</text>

  
  <rect x="20" y="55" width="130" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"></rect>
  <text x="85" y="78" text-anchor="middle" font-size="11" font-weight="500" fill="#334155">Uploaded File</text>
  <text x="85" y="95" text-anchor="middle" font-size="9" fill="#94a3b8">PDF, DOCX, MD, TXT,</text>
  <text x="85" y="106" text-anchor="middle" font-size="9" fill="#94a3b8">SVG, 91+ formats</text>

  
  <line x1="150" y1="85" x2="190" y2="85" stroke="#475569" marker-end="url(#arr)"></line>
  <rect x="198" y="60" width="120" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"></rect>
  <text x="258" y="82" text-anchor="middle" font-size="11" font-weight="500" fill="#854d0e">Vercel Blob</text>
  <text x="258" y="97" text-anchor="middle" font-size="9" fill="#a16207">profile/resource/file</text>

  
  <line x1="318" y1="85" x2="358" y2="85" stroke="#475569" marker-end="url(#arr)"></line>
  <rect x="366" y="55" width="130" height="60" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"></rect>
  <text x="431" y="78" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">Extract</text>
  <text x="431" y="93" text-anchor="middle" font-size="9" fill="#b91c1c">kreuzberg-node</text>
  <text x="431" y="106" text-anchor="middle" font-size="9" fill="#94a3b8">→ plain text</text>

  
  <line x1="496" y1="85" x2="536" y2="85" stroke="#475569" marker-end="url(#arr)"></line>
  <rect x="544" y="55" width="130" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"></rect>
  <text x="609" y="78" text-anchor="middle" font-size="11" font-weight="500" fill="#78350f">Chunk</text>
  <text x="609" y="93" text-anchor="middle" font-size="9" fill="#92400e">markdown headers</text>
  <text x="609" y="106" text-anchor="middle" font-size="9" fill="#94a3b8">→ chunks[]</text>

  
  <rect x="544" y="130" width="230" height="95" rx="6" fill="#fffbeb" stroke="#fde68a"></rect>
  <text x="554" y="148" font-size="9" font-weight="500" fill="#78350f">Each chunk carries:</text>
  <text x="564" y="164" font-size="9" font-family="monospace" fill="#475569">chunk_index: 0, 1, 2, ...</text>
  <text x="564" y="178" font-size="9" font-family="monospace" fill="#475569">header_path: &#34;Ch1 &gt; Sec2&#34;</text>
  <text x="564" y="192" font-size="9" font-family="monospace" fill="#475569">content: &#34;paragraph text...&#34;</text>
  <text x="564" y="206" font-size="9" font-family="monospace" fill="#475569">content_hash: sha256(content)</text>
  <line x1="609" y1="115" x2="609" y2="130" stroke="#fde68a" stroke-dasharray="3,3"></line>

  
  <rect x="40" y="265" width="220" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"></rect>
  <text x="150" y="290" text-anchor="middle" font-size="11" font-weight="500" fill="#1e3a8a">Embed</text>
  <text x="150" y="307" text-anchor="middle" font-size="9" fill="#1d4ed8">BAAI/bge-base-en-v1.5 (ONNX)</text>
  <text x="150" y="322" text-anchor="middle" font-size="9" fill="#94a3b8">tokenize → infer → mean pool → L2 norm</text>

  
  <path d="M609,115 L609,240 L270,240 L270,265" fill="none" stroke="#475569" marker-end="url(#arr)"></path>

  
  <rect x="300" y="270" width="175" height="65" rx="6" fill="#eff6ff" stroke="#bfdbfe"></rect>
  <text x="310" y="290" font-size="9" font-weight="500" fill="#1e3a8a">768-dimensional vector:</text>
  <text x="320" y="308" font-size="9" font-family="monospace" fill="#475569">[0.023, -0.041, 0.118, ...]</text>
  <text x="320" y="322" font-size="9" fill="#94a3b8">L2-normalized for cosine similarity</text>
  <line x1="260" y1="302" x2="300" y2="302" stroke="#bfdbfe" stroke-dasharray="3,3"></line>

  
  <rect x="40" y="380" width="220" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"></rect>
  <text x="150" y="405" text-anchor="middle" font-size="11" font-weight="500" fill="#14532d">Store to kb_chunks</text>
  <text x="150" y="422" text-anchor="middle" font-size="9" fill="#166534">chunk + embedding → PostgreSQL + pgvector</text>

  <line x1="150" y1="340" x2="150" y2="380" stroke="#475569" marker-end="url(#arr)"></line>

  
  <rect x="310" y="370" width="460" height="115" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"></rect>
  <line x1="260" y1="410" x2="310" y2="410" stroke="#475569" marker-end="url(#arr)"></line>

  
  <rect x="325" y="380" width="200" height="95" rx="4" fill="#f3e8ff" stroke="#c4b5fd"></rect>
  <text x="425" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">kb_chunks</text>
  <line x1="325" y1="401" x2="525" y2="401" stroke="#c4b5fd"></line>
  <text x="335" y="415" font-size="8" font-family="monospace" fill="#475569">resource_id  UUID FK</text>
  <text x="335" y="428" font-size="8" font-family="monospace" fill="#475569">chunk_index  INT</text>
  <text x="335" y="441" font-size="8" font-family="monospace" fill="#475569">version      INT</text>
  <text x="335" y="454" font-size="8" font-family="monospace" fill="#475569">embedding    vector(768)</text>
  <text x="335" y="467" font-size="8" font-family="monospace" fill="#475569">is_current   BOOLEAN</text>

  
  <rect x="545" y="380" width="210" height="95" rx="4" fill="#ecfdf5" stroke="#a7f3d0"></rect>
  <text x="650" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">HNSW Index</text>
  <line x1="545" y1="401" x2="755" y2="401" stroke="#a7f3d0"></line>
  <text x="555" y="415" font-size="8" fill="#475569">vector_cosine_ops</text>
  <text x="555" y="430" font-size="8" fill="#475569">m = 16, ef_construction = 200</text>
  <text x="555" y="445" font-size="8" fill="#475569">WHERE is_current = true</text>
  <text x="555" y="465" font-size="8" font-weight="500" fill="#047857">Enables fast ANN search</text>
  <text x="555" y="478" font-size="8" font-weight="500" fill="#047857">over current chunks only</text>

  <line x1="525" y1="437" x2="545" y2="437" stroke="#a7f3d0" stroke-width="1.5"></line>

  
  <rect x="530" y="55" width="12" height="12" rx="6" fill="#22c55e"></rect>
  <rect x="530" y="55" width="12" height="12" rx="6" fill="none" stroke="#16a34a"></rect>
</svg>