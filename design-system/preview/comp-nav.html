<!doctype html><html><head><meta charset="utf-8">
<title>Components — Nav</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 0; background: var(--obsidian); min-height: 140px; }
  .nav {
    display: flex;
    align-items: center;
    padding: 18px 26px;
    border-bottom: 1px solid var(--rule);
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
  }
  .brand { display:flex; align-items:center; gap: 8px; }
  .brand .g { color: var(--temper-blue); display:inline-flex; }
  .brand .g svg { height: 16px; width: 16px; }
  .brand .w {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--temper-blue);
  }
  .links {
    margin-left: auto;
    display: flex;
    gap: 22px;
  }
  .links a {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--graphite);
    text-decoration: none;
  }
  .links a.on { color: var(--chalk); }
  .cta {
    margin-left: 22px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--temper-blue);
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--temper-blue-border);
    background: transparent;
    text-decoration: none;
  }
  .sub {
    padding: 14px 26px;
    font-family: var(--serif);
    font-style: italic;
    color: var(--graphite);
    font-size: 11px;
  }
</style>
</head>
<body>
  <nav class="nav">
    <div class="brand">
      <span class="g">
        <svg viewBox="0 0 32 32" fill="none">
          <path d="M 12 7 L 12 25" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M 6 13 L 18 13 Q 23 13 25 16.5 Q 27 20 25 24" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="w">temper</span>
    </div>
    <div class="links">
      <a class="on">For builders</a>
      <a>For agents</a>
      <a>Docs</a>
    </div>
    <a class="cta">Sign in</a>
  </nav>
  <div class="sub">Transparent &lt; 40px · blurred obsidian @ 95% thereafter.</div>
</body></html>
