<!doctype html><html><head><meta charset="utf-8">
<title>Type — Body & Tagline</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 20px 26px; }
  .body {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.8;
    color: var(--chalk);
    margin: 0;
  }
  .body strong { color: var(--parchment); font-weight: 400; }
  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--graphite);
    line-height: 1.7;
    margin: 14px 0 0 0;
  }
  .meta {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--graphite-2);
    margin-bottom: 6px;
  }
</style>
</head>
<body>
  <div class="meta">Body · Georgia · 1rem · 1.8 leading</div>
  <p class="body">The frontmatter carries the <strong>throughline</strong>. The content carries the thinking.</p>
  <div class="meta">Italic deck</div>
  <p class="tagline">Know what was decided, what's deferred, and what comes next.</p>
</body></html>
