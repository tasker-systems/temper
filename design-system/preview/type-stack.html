<!doctype html><html><head><meta charset="utf-8">
<title>Type — Font Stack</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 22px 26px; }
  .lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--graphite-2); margin-bottom: 6px; }
  .spec { font-family: var(--serif); font-size: 30px; font-weight: 300; letter-spacing: 0.01em; color: var(--parchment); line-height: 1.1; margin: 0 0 4px 0; }
  .spec em { color: var(--temper-blue); font-style: italic; }
  .meta { font-family: var(--mono); font-size: 9px; color: var(--graphite); letter-spacing: 0.08em; margin-bottom: 14px; }
  .mono-spec { font-family: var(--mono); font-size: 18px; color: var(--temper-blue); letter-spacing: 0.02em; margin: 0 0 4px 0; }
</style>
</head>
<body>
  <div class="lbl">READING FACE</div>
  <p class="spec">Source Serif <em>4</em></p>
  <div class="meta">SIL OFL · variable · opsz 8–60 · weights 300/400/600 · self-hostable</div>
  <div class="lbl">TECHNICAL VOICE</div>
  <p class="mono-spec">JetBrains Mono</p>
  <div class="meta">SIL OFL · weights 300/400/500 · no change</div>
</body></html>
