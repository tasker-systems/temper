<!doctype html><html><head><meta charset="utf-8">
<title>Components — Resource Meta Header</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 22px 26px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--temper-blue);
    margin-bottom: 12px;
  }
  .title {
    font-family: var(--serif);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.05;
    font-size: 28px;
    color: var(--parchment);
    margin: 0 0 10px 0;
  }
  .strip {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--graphite);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .strip .sep { color: var(--graphite-3); }
  .strip .v { color: var(--chalk); }
  .strip .blue { color: var(--temper-blue); }
</style>
</head>
<body>
  <div class="eyebrow">RESEARCH · SEQ 003</div>
  <h1 class="title">Choosing an invoice provider</h1>
  <div class="strip">
    <span>STAGE · <span class="v">DECIDED</span></span><span class="sep">·</span>
    <span>MODE · <span class="v">REVIEW</span></span><span class="sep">·</span>
    <span>EFFORT · <span class="blue">MEDIUM</span></span>
  </div>
</body></html>
