<!doctype html><html><head><meta charset="utf-8">
<title>Diagram — Session Cycle</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px 28px; background: var(--obsidian-3); min-height: 340px; }
  .frame { padding: 20px 24px; }
  .title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--temper-blue); margin-bottom: 4px; }
  .sub { font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--chalk); margin-bottom: 26px; }
  svg { display: block; width: 100%; height: auto; }
  .cap { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--graphite); margin-top: 12px; line-height: 1.55; }
  .cap em { color: var(--temper-blue); font-style: italic; }
</style>
</head>
<body>
  <div class="frame">
    <div class="title">SESSION CONTINUITY · CYCLE</div>
    <div class="sub">Every session starts with recall and ends with a record.</div>

    <svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg">
      <!--
        Same "color pours into the word" treatment as the layers diagram.
        Underline remains — it's earning its keep here as a step divider on the loop —
        but its colour now echoes the word's so the two read as one object.
        "work" stays parchment: it's the uncoloured doing between bookends.
      -->
      <defs>
        <linearGradient id="c-warmup" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#8cc5e2"/>
          <stop offset="100%" stop-color="#e8e4df"/>
        </linearGradient>
        <linearGradient id="c-decide" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#f5d277"/>
          <stop offset="100%" stop-color="#ebe2d0"/>
        </linearGradient>
        <linearGradient id="c-record" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#9ed3af"/>
          <stop offset="100%" stop-color="#e5e6de"/>
        </linearGradient>
      </defs>

      <!-- Center thread (the loop) -->
      <circle cx="320" cy="140" r="95" stroke="rgba(126,184,218,0.20)" stroke-width="0.75" fill="none"/>

      <!-- 01 WARM UP (top, blue) -->
      <g>
        <text x="320" y="38" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="rgba(255,255,255,0.32)" letter-spacing="2.5">01</text>
        <text x="320" y="58" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="18" font-weight="500" fill="url(#c-warmup)">warm up</text>
        <line x1="294" y1="66" x2="346" y2="66" stroke="#8cc5e2" stroke-width="0.75" opacity="0.55"/>
      </g>

      <!-- 02 WORK (right, neutral — the uncoloured doing) -->
      <g>
        <text x="530" y="134" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="rgba(255,255,255,0.32)" letter-spacing="2.5">02</text>
        <text x="530" y="154" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="18" font-weight="500" fill="#e8e4df">work</text>
        <line x1="512" y1="162" x2="548" y2="162" stroke="rgba(255,255,255,0.28)" stroke-width="0.75"/>
      </g>

      <!-- 03 DECIDE (bottom, amber) -->
      <g>
        <text x="320" y="234" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="rgba(255,255,255,0.32)" letter-spacing="2.5">03</text>
        <text x="320" y="254" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="18" font-weight="500" fill="url(#c-decide)">decide</text>
        <line x1="296" y1="262" x2="344" y2="262" stroke="#f5d277" stroke-width="0.75" opacity="0.6"/>
      </g>

      <!-- 04 RECORD (left, green — produces the session doc) -->
      <g>
        <text x="110" y="134" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="rgba(255,255,255,0.32)" letter-spacing="2.5">04</text>
        <text x="110" y="154" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="18" font-weight="500" fill="url(#c-record)">record</text>
        <line x1="86" y1="162" x2="134" y2="162" stroke="#9ed3af" stroke-width="0.75" opacity="0.6"/>
      </g>

      <!-- Arrow tips along the circle -->
      <g fill="#7eb8da" opacity="0.75">
        <polygon points="413,76 416,86 406,82" transform="rotate(45 410 80)"/>
        <polygon points="413,204 416,214 406,210" transform="rotate(135 410 208)"/>
        <polygon points="227,204 230,214 220,210" transform="rotate(-135 224 208)"/>
        <polygon points="227,76 230,86 220,82" transform="rotate(-45 224 80)"/>
      </g>

      <!-- Center label -->
      <text x="320" y="138" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="rgba(255,255,255,0.30)" letter-spacing="3">THE VAULT</text>
      <text x="320" y="156" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-size="13" fill="rgba(255,255,255,0.48)">grows</text>
    </svg>

    <div class="cap">Warm up with recall. Work. Decide. <em>Record.</em> The vault grows on every loop — and the colours match the doc types they produce.</div>
  </div>
</body></html>
