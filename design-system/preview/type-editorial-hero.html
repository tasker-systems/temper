<!doctype html><html><head><meta charset="utf-8">
<title>Type — Editorial Hero</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 22px 26px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--temper-blue);
    margin-bottom: 12px;
  }
  .name {
    font-family: var(--serif);
    font-size: 54px;
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 0.95;
    color: var(--parchment);
    margin: 0;
  }
  .deck {
    margin-top: 10px;
    font-family: var(--serif);
    font-size: 14px;
    font-style: italic;
    color: var(--chalk);
    line-height: 1.55;
  }
  .deck .num { font-style: normal; color: var(--parchment); }
  .deck .sep { font-style: normal; color: var(--graphite); margin: 0 0.45em; }
  .deck .state { color: var(--temper-blue); }
</style>
</head>
<body>
  <div class="eyebrow">VAULT · @ME · MYAPP</div>
  <h1 class="name">All resources</h1>
  <div class="deck"><span class="num">847</span> <span class="sep">·</span> indexed <span class="sep">·</span> <span class="state">ready</span></div>
</body></html>
