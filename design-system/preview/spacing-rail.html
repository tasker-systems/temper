<!doctype html><html><head><meta charset="utf-8">
<title>Spacing — Section Rail</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 20px 26px; }
  .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--temper-blue);
    margin-bottom: 10px;
  }
  .rail {
    border-left: 2px solid rgba(126,184,218,0.25);
    padding-left: 26px;
  }
  .h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 20px;
    line-height: 1.3;
    color: var(--parchment);
    margin: 0 0 8px 0;
  }
  .h2 em { color: var(--temper-blue); font-style: italic; }
  .p {
    font-family: var(--serif);
    font-size: 13px;
    line-height: 1.75;
    color: var(--chalk);
    margin: 0;
  }
  .anno {
    position: absolute;
    left: 24px;
    top: 32px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--graphite-2);
    writing-mode: vertical-rl;
  }
  .wrap { position: relative; padding-left: 18px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">THE PROBLEM</div>
    <div class="rail">
      <h2 class="h2">Context that <em>decays</em></h2>
      <p class="p">Two‑pixel steel‑blue left rail · 1.6rem indent · the single most recognisable Temper layout cue.</p>
    </div>
  </div>
</body></html>
