<!doctype html><html><head><meta charset="utf-8">
<title>Type — Serif Display</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 22px 26px; }
  .hero {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 40px;
    line-height: 1.1;
    letter-spacing: 0.02em;
    color: var(--parchment);
    margin: 0 0 4px 0;
  }
  .hero em {
    color: var(--temper-blue);
    font-style: italic;
  }
  .h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 22px;
    line-height: 1.3;
    color: var(--parchment);
    margin: 16px 0 4px 0;
  }
  .h2 em { color: var(--temper-blue); font-style: italic; }
  .meta {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--graphite-2);
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="meta">Hero · Georgia · 300 · clamp(2.4rem, 5vw, 3.8rem)</div>
  <h1 class="hero">Clarify your <em>intention</em></h1>
  <div class="meta" style="margin-top:14px">H2 · Georgia · 300 · 1.6rem</div>
  <h2 class="h2">Context that <em>compounds</em></h2>
</body></html>
