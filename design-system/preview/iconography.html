<!doctype html><html><head><meta charset="utf-8">
<title>Iconography — Phosphor Thin</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-start; }
  .it { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .it svg { width: 22px; height: 22px; color: var(--chalk); stroke-width: 1; }
  .it .nm { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--graphite); text-transform: uppercase; }
  .note { margin-top: 14px; font-family: var(--serif); font-style: italic; font-size: 12.5px; color: var(--graphite); line-height: 1.55; }
  /* Phosphor Thin — 1px stroke, outline style. These are inline for the card preview. */
</style>
</head>
<body>
  <div class="row">
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><circle cx="112" cy="112" r="72"/><line x1="164" y1="164" x2="212" y2="212"/></svg>
      <span class="nm">search</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><line x1="52" y1="52" x2="204" y2="204"/><line x1="204" y1="52" x2="52" y2="204"/></svg>
      <span class="nm">close</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><polyline points="96 48 176 128 96 208"/></svg>
      <span class="nm">chevron</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><path d="M40 200 L128 56 L216 200"/><line x1="72" y1="152" x2="184" y2="152"/></svg>
      <span class="nm">layers</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><circle cx="128" cy="128" r="96"/><polyline points="128 72 128 128 168 152"/></svg>
      <span class="nm">session</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><rect x="40" y="40" width="176" height="176" rx="0"/><line x1="40" y1="96" x2="216" y2="96"/></svg>
      <span class="nm">vault</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><polyline points="200 72 104 168 56 120"/></svg>
      <span class="nm">check</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"><line x1="40" y1="128" x2="216" y2="128"/><line x1="128" y1="40" x2="128" y2="216"/></svg>
      <span class="nm">add</span>
    </div>
  </div>
  <div class="note">Phosphor Thin · 1px stroke · outline only · never paired with a text label.</div>
</body></html>
