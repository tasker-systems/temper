<!doctype html><html><head><meta charset="utf-8">
<title>Brand — Mark</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body {
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 28px;
    min-height: 140px;
  }
  .big {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 140px;
    flex-shrink: 0;
    color: var(--temper-blue);
  }
  .big svg { width: 100%; height: auto; }
  .meta { flex: 1; }
  .wm {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.15em;
    color: var(--temper-blue);
    margin-bottom: 10px;
  }
  .line {
    font-family: var(--serif);
    font-style: italic;
    font-size: 12.5px;
    color: var(--chalk);
    line-height: 1.6;
  }
  .line em { color: var(--parchment); font-style: italic; }
</style>
</head>
<body>
  <div class="big">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none">
      <path d="M 12 7 L 12 25" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 6 13 L 18 13 Q 23 13 25 16.5 Q 27 20 25 24" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="meta">
    <div class="wm">temper</div>
    <div class="line">A lowercase <em>t</em> whose crossbar curves and continues — the thread weaving onward.</div>
  </div>
</body></html>
