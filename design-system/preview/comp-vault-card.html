<!doctype html><html><head><meta charset="utf-8">
<title>Components — Vault Card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card {
    padding: 14px 16px;
    border: 1px solid var(--rule);
    background: var(--card-bg-2);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card.on { border-color: var(--temper-blue-border-dim); background: var(--temper-blue-card); }
  .kind {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--temper-blue);
  }
  .t {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--parchment);
    line-height: 1.3;
  }
  .meta {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--graphite);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: auto;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="card on">
      <span class="kind">RESEARCH</span>
      <div class="t">Choosing an invoice provider</div>
      <div class="meta">003 · DECIDED · 3D</div>
    </div>
    <div class="card">
      <span class="kind">SESSION</span>
      <div class="t">Wire up Stripe checkout</div>
      <div class="meta">012 · ACTIVE · 2H</div>
    </div>
  </div>
</body></html>
