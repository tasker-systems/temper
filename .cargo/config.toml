[env]
WORKSPACE_PATH = { value = ".", relative = true }

# Pin the pdfium binary that kreuzberg's build.rs embeds (temper-ingest, `bundled-pdfium`).
#
# Left unset, build.rs resolves the version by querying the GitHub API for the LATEST release of
# bblanchon/pdfium-binaries — and when that call fails (rate limit, no egress) it does NOT fail the
# build: it prints a warning and falls back to a hardcoded "7568". So an unpinned build silently
# links whichever pdfium the network mood of the day produced, and still goes green. Two release
# builds of the same tag could embed different PDF parsers.
#
# Pinned here rather than in each workflow's `env:` because EVERY cargo invocation that compiles
# temper-cli with `extract` runs that build script — release, CI tests, clippy, and local dev. The
# ONNX install already taught this repo what happens when one setting is copy-pasted across five
# workflow files. One line, one source of truth.
#
# Bumping: pdfium parses untrusted input, so track releases rather than letting this rot. Verify the
# tag exists for all three release targets before bumping:
#   https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/<VER>/pdfium-{mac-arm64,linux-x64,win-x64}.tgz
PDFIUM_VERSION = "7947"

[profile.dev]
incremental = true
split-debuginfo = "unpacked"

[profile.release]
incremental = false
opt-level = 3
strip = true
lto = "fat"
panic = "abort"
codegen-units = 1
